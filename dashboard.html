<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Premium Executive Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040404;
  --surface: #0a0a0a;
  --surface2: #121212;
  --border: #1c1c1c;
  --border2: #282828;
  --text: #f5f5f5;
  --muted: #666666;
  --accent: #ffffff;
  --accent-dim: #a3a3a3;
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
body::before {
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.4;
}

.container { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

/* HEADER SIMPLIFICADO AL ESTILO PASTEBIN PREMIUM */
header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 40px; animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
  background: rgba(10, 10, 10, 0.5); padding: 16px 24px; border-radius: 14px;
  border: 1px solid var(--border); backdrop-filter: blur(8px);
}
.logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
.logo-icon {
  width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text);
}
.logo { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; letter-spacing: -1px; }
.logo span { color: var(--muted); }

/* BARRA DE BÚSQUEDA INTERNA */
.search-box-container {
  position: relative;
  width: 250px;
}
.search-box-container input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 8px 12px 8px 32px;
  border-radius: 8px; color: #fff; font-size: 13px; font-family: 'Space Grotesk';
}
.search-box-container::before { content: '🔍'; position: absolute; left: 10px; top: 8px; font-size: 12px; opacity: 0.5; }

.header-right { display: flex; gap: 12px; align-items: center; }
.user-avatar-btn {
  width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
  background: var(--surface2); border: 1px solid var(--border2); cursor: pointer; transition: transform 0.2s;
}
.user-avatar-btn:hover { transform: scale(1.05); }

/* LAYOUT DASHBOARD */
.dashboard-layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; animation: fadeUp 0.7s 0.1s cubic-bezier(.16,1,.3,1) both; }

@media (max-width: 768px) {
  .dashboard-layout { grid-template-columns: 1fr; }
}

.sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.sidebar h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 600; margin-bottom: 5px; }

.folder-list { list-style: none; }
.folder-item {
  padding: 12px 14px; background: transparent; border: 1px solid transparent;
  border-radius: 8px; margin-bottom: 8px; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; font-size: 14px; transition: all 0.2s ease;
}
.folder-item:hover { background: var(--surface2); border-color: var(--border); }
.folder-item.active { border-color: var(--border2); background: var(--surface2); font-weight: 500; }
.folder-item span { display: flex; align-items: center; gap: 10px; width: 100%; }

.delete-btn { background: transparent; color: #444; border: none; cursor: pointer; font-size: 13px; padding: 4px 8px; border-radius: 4px; transition: all 0.2s; }
.delete-btn:hover { color: var(--danger); background: var(--danger-bg); }

.main-content { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; min-height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
.script-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

/* MENÚ HAMBURGUESA LATERAL (IMAGEN 234194) */
.hamburger-sidebar {
  position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border); z-index: 999;
  padding: 40px 24px; display: flex; flex-direction: column; gap: 14px;
  transition: right 0.35s cubic-bezier(.16,1,.3,1); box-shadow: -15px 0 45px rgba(0,0,0,0.7);
}
.hamburger-sidebar.open { right: 0; }
.close-menu-btn { align-self: flex-end; background: transparent; border: none; color: var(--muted); font-size: 22px; cursor: pointer; margin-bottom: 10px; }

.menu-link-item {
  width: 100%; text-align: left; background: transparent; border: none; color: var(--text);
  padding: 12px 14px; font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 12px; transition: background 0.2s;
}
.menu-link-item:hover { background: var(--surface2); }

/* CARDS DE SCRIPTS */
.script-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; display: flex; flex-direction: column; justify-content: space-between; min-height: 155px; transition: all 0.25s cubic-bezier(.16,1,.3,1);
}
.script-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
.script-card h4 { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.script-card p { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 11px; margin-top: 4px; }
.card-actions { display: flex; gap: 8px; margin-top: auto; }

/* MULTI-ACCOUNT SIDEBAR DENTRO DEL MENÚ DESPLEGABLE */
.account-section {
  border-top: 1px solid var(--border);
  padding-top: 15px;
  margin-top: 15px;
}
.account-item-btn {
  width: 100%; text-align: left; background: transparent; border: 1px solid transparent;
  color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 13px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: all 0.2s; margin-bottom: 4px;
}
.account-item-btn:hover { background: var(--surface2); color: var(--text); }
.account-item-btn.active-acc { border-color: var(--border2); background: rgba(255,255,255,0.02); color: #fff; font-weight: 500; }
.account-badge-current { font-size: 9px; background: #fff; color: #000; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-left: auto; font-family: 'JetBrains Mono'; }

/* MODAL LOADER CYBERPUNK */
.loader-overlay {
  position: fixed; inset: 0; background: rgba(4,4,4,0.92); backdrop-filter: blur(12px);
  z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
}
.cyber-spinner {
  width: 50px; height: 50px; border: 2px solid var(--border2); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 1s linear infinite;
}
.loader-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent-dim); letter-spacing: 0.05em; }

/* BUTTONS UPGRADED */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 8px;
  padding: 10px 16px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
}
.btn-primary { background: var(--text); color: #040404; }
.btn-primary:hover { background: var(--accent-dim); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--accent-dim); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: #555; }
.btn-danger { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-danger:hover { color: var(--danger); border-color: rgba(239, 68, 68, 0.2); background: var(--danger-bg); }

.menu-trigger-btn { background: transparent; border: none; color: var(--text); font-size: 22px; cursor: pointer; display: flex; align-items: center; padding: 4px; }
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #040404; font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 8px;
  pointer-events: none; opacity: 0; transition: all 0.3s cubic-bezier(.16,1,.3,1); z-index: 1000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes fadeUp { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="loaderOverlay" class="loader-overlay">
  <div class="cyber-spinner"></div>
  <div id="loaderText" class="loader-text">> DECRYPTING VAULT INSTANCE...</div>
</div>

<div class="container">
  <header>
    <a class="logo-wrap" href="#">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </a>
    
    <div class="search-box-container">
      <input type="text" id="dashboardSearch" placeholder="Search scripts..." oninput="renderScripts()">
    </div>
    
    <div class="header-right">
      <img id="headerUserAvatar" class="user-avatar-btn" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3.33-8-3.33z'/%3E%3C/svg%3E" onclick="toggleHamburgerMenu(true)">
      <button class="menu-trigger-btn" onclick="toggleHamburgerMenu(true)">☰</button>
    </div>
  </header>

  <div class="dashboard-layout">
    <div class="sidebar">
      <h3>📂 Folders</h3>
      <ul id="folderList" class="folder-list"></ul>
      <button class="btn btn-ghost" style="width: 100%; margin-bottom: 5px;" onclick="createNewFolder()">+ New Folder</button>
    </div>

    <div class="main-content">
      <div class="content-header">
        <h3 id="currentFolderName" style="font-family:'JetBrains Mono'; font-size:14px; color:var(--muted); font-weight:500;">Select a folder layout</h3>
        <button id="newScriptBtn" class="btn btn-primary" style="display: none;" onclick="goToEditorForNewScript()">+ Add Script</button>
      </div>
      <div id="scriptGrid" class="script-grid"></div>
    </div>
  </div>
</div>

<div id="hamburgerMenu" class="hamburger-sidebar">
  <button class="close-menu-btn" onclick="toggleHamburgerMenu(false)">✕</button>
  
  <button class="menu-link-item" onclick="window.location.href='dashboard.html'">📋 Dashboard Hub</button>
  <button class="menu-link-item" onclick="window.location.href='profile.html'">👤 Edit My Profile</button>
  
  <div class="account-section">
    <h3>👤 Linked Vault Profiles</h3>
    <div id="accountProfilesList"></div>
    <button class="btn btn-ghost" style="width:100%; font-size:11px; margin-top:10px; padding:6px 12px;" onclick="linkAnotherProfile()">+ Link Another Profile</button>
  </div>
  
  <button class="menu-link-item" style="color: var(--danger); margin-top: auto; border: 1px solid rgba(239, 68, 68, 0.15);" onclick="logout()">➔ Log Out Account</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* Particle Engine */
const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; } resize(); addEventListener('resize', resize);
class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W; this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.2; this.vy = -(Math.random() * 0.25 + 0.05);
    this.r = Math.random() * 1 + 0.4; this.alpha = Math.random() * 0.3 + 0.05; this.life = 0; this.maxLife = Math.random() * 600 + 300;
  }
  update() { this.x += this.vx; this.y += this.vy; this.life++; if (this.life > this.maxLife || this.y < -10) this.reset(false); }
  draw() { const p = this.life / this.maxLife; const fade = p < 0.1 ? p/0.1 : p > 0.8 ? 1-(p-0.8)/0.2 : 1; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,' + (this.alpha * fade) + ')'; ctx.fill(); }
}
const particles = Array.from({length:80}, () => new Particle());
(function animate() {
  ctx.clearRect(0,0,W,H);
  for (let i=0;i<particles.length;i++) {
    for (let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y; const d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle='rgba(255,255,255,'+(1-d/90)*0.02+')'; ctx.lineWidth=0.5; ctx.stroke(); }
    }
  }
  particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate);
})();

/* Vault Core System */
let currentFolderId = null;
const activeUser = localStorage.getItem("logged_user");

// Verificación Física de Sesión: Si no está logueado, lo manda directo a login.html
if(!activeUser) {
  window.location.href = "login.html";
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
function toggleHamburgerMenu(open) { document.getElementById("hamburgerMenu").classList.toggle("open", open); }

function logout() {
  localStorage.removeItem("logged_user");
  window.location.href = "login.html";
}

function linkAnotherProfile() {
  localStorage.removeItem("logged_user");
  window.location.href = "login.html";
}

// Carga el avatar guardado en profile.html
function loadUserAvatarHeader() {
  const users = JSON.parse(localStorage.getItem("vault_users")) || {};
  if(users[activeUser] && users[activeUser].avatarUrl) {
    document.getElementById("headerUserAvatar").src = users[activeUser].avatarUrl;
  }
}

/* SISTEMA MULTI-CUENTAS DINÁMICO DESDE EL MENÚ */
function renderAccountProfiles() {
  const usersObj = JSON.parse(localStorage.getItem("vault_users")) || {};
  const container = document.getElementById("accountProfilesList");
  container.innerHTML = "";

  Object.keys(usersObj).forEach(user => {
    const isCurrent = user === activeUser;
    const btn = document.createElement("button");
    btn.className = `account-item-btn ${isCurrent ? 'active-acc' : ''}`;
    
    // Muestra el nombre personalizado si se configuró en profile.html
    const displayAlias = usersObj[user].displayName || user;
    btn.innerHTML = `👤 <span>${displayAlias}</span> ${isCurrent ? '<span class="account-badge-current">ACTIVE</span>' : ''}`;
    
    if(!isCurrent) {
      btn.onclick = () => switchAccountSimulation(user);
    }
    container.appendChild(btn);
  });
}

function switchAccountSimulation(targetUser) {
  toggleHamburgerMenu(false);
  const overlay = document.getElementById("loaderOverlay");
  const loaderText = document.getElementById("loaderText");
  
  overlay.style.display = "flex";
  loaderText.textContent = `> DECOUPLING CURRENT INSTANCE...`;

  setTimeout(() => {
    loaderText.textContent = `> ACCESSING CORE FOR USER [${targetUser.toUpperCase()}]...`;
    setTimeout(() => {
      localStorage.setItem("logged_user", targetUser);
      location.reload(); // Recarga la página bajo el nuevo contexto de usuario
    }, 900);
  }, 800);
}

/* DIRECTORIOS Y SCRIPTS CON BÚSQUEDA INTEGRADA */
function renderFolders() {
  const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  const listElement = document.getElementById("folderList"); listElement.innerHTML = "";
  const userFolders = folders.filter(f => f.username === activeUser);
  userFolders.forEach(folder => {
    const li = document.createElement("li");
    li.className = `folder-item ${currentFolderId === folder.id ? 'active' : ''}`;
    li.innerHTML = `<span onclick="selectFolder('${folder.id}', '${folder.name}')">📁 ${folder.name}</span><button class="delete-btn" onclick="deleteFolder('${folder.id}', event)">✕</button>`;
    listElement.appendChild(li);
  });
}

function createNewFolder() {
  const name = prompt("Enter folder name:"); if(!name || !name.trim()) return;
  const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  folders.push({ id: "fold_" + Date.now(), name: name.trim(), username: activeUser });
  localStorage.setItem("vault_folders", JSON.stringify(folders)); renderFolders();
}

function deleteFolder(id, event) {
  event.stopPropagation(); if(!confirm("Delete folder and all its contents permanently?")) return;
  let folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  localStorage.setItem("vault_folders", JSON.stringify(folders.filter(f => f.id !== id)));
  let scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.folderId !== id)));
  if(currentFolderId === id) { currentFolderId = null; document.getElementById("currentFolderName").innerText = "Select a folder layout"; document.getElementById("newScriptBtn").style.display = "none"; }
  renderFolders(); renderScripts();
}

function selectFolder(id, name) {
  currentFolderId = id; document.getElementById("currentFolderName").innerText = `📁 ${name}`;
  document.getElementById("newScriptBtn").style.display = "inline-flex"; renderFolders(); renderScripts();
}

function renderScripts() {
  const grid = document.getElementById("scriptGrid"); grid.innerHTML = ""; if(!currentFolderId) return;
  const scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  const searchVal = document.getElementById("dashboardSearch").value.toLowerCase().trim();
  
  // Filtra por carpeta y por término de búsqueda en tiempo real
  const folderScripts = scripts.filter(s => s.folderId === currentFolderId && (s.title.toLowerCase().includes(searchVal) || s.id.toLowerCase().includes(searchVal)));
  
  folderScripts.forEach(script => {
    const card = document.createElement("div"); card.className = "script-card";
    card.innerHTML = `<div><h4>${script.title}</h4><p>ID: ${script.id}</p></div>
      <div class="card-actions">
        <button class="btn btn-ghost" style="padding:6px 12px; font-size:11px; width:50%;" onclick="viewScript('${script.id}')">View/Edit</button>
        <button class="btn btn-danger" style="padding:6px 12px; font-size:11px; width:50%;" onclick="deleteScript('${script.id}')">Delete</button>
      </div>`;
    grid.appendChild(card);
  });
}

function goToEditorForNewScript() {
  localStorage.setItem("active_folder_target", currentFolderId);
  localStorage.setItem("last_active_folder", currentFolderId); // Recuerda la carpeta activa al regresar
  window.location.href = `index.html?from=dashboard&folderId=${currentFolderId}`;
}

function viewScript(id) {
  window.location.href = `view.html?id=${id}`;
}

function deleteScript(id) {
  if(!confirm("Delete this script?")) return;
  let scripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
  localStorage.setItem("vault_scripts", JSON.stringify(scripts.filter(s => s.id !== id)));
  renderScripts(); showToast("✓ Script deleted locally");
}

// Inicialización de la persistencia al cargar el archivo independiente
loadUserAvatarHeader();
renderFolders(); 
renderAccountProfiles();

// Comprueba si venías guardando un script en index.html para reabrir tu carpeta automática
const restoreFolderId = localStorage.getItem("last_active_folder");
if(restoreFolderId) {
  const folders = JSON.parse(localStorage.getItem("vault_folders")) || [];
  const targeted = folders.find(f => f.id === restoreFolderId);
  if(targeted) {
    selectFolder(targeted.id, targeted.name);
  }
  localStorage.removeItem("last_active_folder");
}
</script>
</body>
</html>
