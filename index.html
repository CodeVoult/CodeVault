<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Onyx Black Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<script>
  // ── VALIDACIÓN DE ACCESO SEGURO ──
  const activeUser = localStorage.getItem("logged_user");
  const urlParams = new URLSearchParams(window.location.search);
  const vieneDeFila = urlParams.get('from') === 'dashboard';

  if (!activeUser) {
    window.location.href = "login.html";
  } else if (!vieneDeFila) {
    window.location.href = "dashboard.html";
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #040405;
  --surface-cards: #08080a;
  --border: #121215;
  --border-focus: #1e1e22;
  --text: #ffffff;
  --muted: #4e4e56;
  --code-bg: #020203;

  /* Gradientes Cromados Premium */
  --silver-light: linear-gradient(135deg, #ffffff 0%, #e2e8f0 40%, #94a3b8 70%, #cbd5e1 100%);
  --silver-medium: linear-gradient(135deg, #5a5d64 0%, #27282c 60%, #3a3d45 100%);
  --silver-dark: linear-gradient(135deg, #2e3035 0%, #0f1012 50%, #1e2024 100%);
  --silver-glow: rgba(255, 255, 255, 0.08);
  --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.22;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 24px 100px;
}

/* ── LOGO REDISEÑADO PREMIUM (MARCA ESTÁTICA) ── */
header {
  margin-bottom: 50px;
  text-align: center;
  animation: fadeUpPremium 0.9s var(--ease-premium) both;
}

.logo-container {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  user-select: none;
  cursor: default;
}

.logo-badge {
  width: 56px;
  height: 56px;
  background: var(--bg);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text);
  position: relative;
  transition: all 0.5s var(--ease-premium);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

.logo-badge::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1px;
  background: linear-gradient(135deg, #ffffff 0%, #3a3b40 45%, #ffffff 55%, #111215 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.logo-badge-inner {
  background: var(--silver-light);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
  filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
}

.logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1.5px;
  background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.logo-text span {
  font-weight: 300;
  background: linear-gradient(180deg, #8a8a93 0%, #3f3f46 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 6px;
}

/* ── EDITOR CARD ── */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 40px 90px rgba(0,0,0,0.95);
  animation: fadeUpPremium 1s 0.1s var(--ease-premium) both;
  transition: border-color 0.5s var(--ease-premium), box-shadow 0.5s var(--ease-premium);
}

.editor-card:focus-within { 
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 40px 90px rgba(0,0,0,0.95), 0 0 50px rgba(255,255,255,0.02);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-cards);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.sys-indicators {
  display: flex;
  gap: 6px;
}
.indicator-dot { width: 7px; height: 7px; border-radius: 50%; background: #1c1c21; }
.indicator-dot.active { background: #ffffff; box-shadow: 0 0 8px #ffffff; }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #a1a1aa;
  font-weight: 700;
  background: #121215;
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 6px;
  letter-spacing: 0.05em;
}

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── WORKSPACE TEXTAREA ── */
textarea {
  width: 100%;
  height: 400px;
  background: transparent;
  color: #e4e4e7;
  border: none;
  outline: none;
  padding: 26px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.75;
  caret-color: var(--text);
}

textarea::placeholder { color: #27272a; }

/* PANEL DE ACCIONES ADAPTATIVO */
.actions-panel {
  display: flex;
  gap: 12px;
  padding: 18px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface-cards);
}

/* ── BOTONES CON EFECTO DE CROMO/PLATEADO LÍQUIDO ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s var(--ease-premium);
  position: relative;
  white-space: nowrap;
}

/* Estilo Cromo Líquido de la Acción Principal */
.btn-silver-action { 
  background: var(--silver-light); 
  color: #000000; 
  font-weight: 700;
  box-shadow: 0 4px 15px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.4);
}

.btn-silver-action:hover { 
  background: #ffffff;
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255,255,255,0.18), inset 0 1px 0 rgba(255,255,255,0.5);
  filter: brightness(1.05);
}
.btn-silver-action:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Estilo Dark Chrome / Metal Pulido Oscuro (Copy) */
.btn-secondary {
  background: var(--silver-dark);
  color: #e4e4e7;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
}

.btn-secondary:hover { 
  color: #ffffff; 
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1), 0 0 12px var(--silver-glow);
}

/* ── BOTÓN CLEAR OPTIMIZADO PARA MÓVILES (Metal Pulido Medio con Alto Contraste) ── */
.btn-clear-action {
  background: var(--silver-medium);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.15);
  box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
  margin-left: auto;
}

.btn-clear-action:hover {
  background: linear-gradient(135deg, #71757d 0%, #36383e 60%, #4c505b 100%);
  border-color: rgba(255, 255, 255, 0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
}

.btn svg { width: 14px; height: 14px; stroke-width: 2.5; }

/* ── RESPONSIVE GRID ADAPTATIVO PARA MÓVILES (FIX DESBORDAMIENTO) ── */
@media (max-width: 600px) {
  .actions-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px;
  }
  .btn {
    padding: 12px 14px;
    font-size: 12px;
  }
  .btn-clear-action {
    grid-column: span 2;
    width: 100%;
    margin-left: 0;
  }
}

/* ── RESULTS ARCHITECTURE ── */
.result-vault {
  margin-top: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  display: none;
  box-shadow: 0 30px 70px rgba(0,0,0,0.95);
  animation: fadeUpPremium 0.6s var(--ease-premium) both;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-cards);
}

.status-container {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.status-pulse {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 0 8px #ffffff;
}

.script-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.result-body { padding: 24px; }
.meta-block { margin-bottom: 24px; }
.meta-block:last-of-type { margin-bottom: 12px; }

.meta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}

.display-box {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.display-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #a1a1aa;
  padding: 18px;
  word-break: break-all;
  line-height: 1.65;
}

.btn-copy-inline {
  width: 100%;
  background: var(--silver-dark);
  border: none;
  border-top: 1px solid var(--border);
  color: #a1a1aa;
  padding: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s var(--ease-premium);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}

.btn-copy-inline:hover { background: #131418; border-top-color: rgba(255,255,255,0.15); color: var(--text); }

.viewer-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s var(--ease-premium);
}
.viewer-trigger:hover { color: var(--text); }

/* ── SYSTEM TOAST ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ffffff;
  color: #000000;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 12px 26px;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.5s var(--ease-premium);
  z-index: 1000;
  letter-spacing: 0.02em;
  box-shadow: 0 25px 50px rgba(0,0,0,0.85);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUpPremium {
  from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

footer {
  margin-top: 80px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #1c1c21;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-container">
      <div class="logo-badge"><span class="logo-badge-inner">⚡</span></div>
      <div class="logo-text">CODE<span>VAULT</span></div>
    </div>
    <div class="tagline">// SECURE SPECIFICATION ENVIRONMENT</div>
  </header>

  <div class="editor-card">
    <div class="topbar">
      <div class="topbar-left">
        <div class="sys-indicators">
          <div class="indicator-dot active"></div>
          <div class="indicator-dot"></div>
          <div class="indicator-dot"></div>
        </div>
        <span class="lang-badge">LUA</span>
      </div>
      <span class="line-count" id="lineCount">1 line</span>
    </div>

    <textarea id="code" placeholder="-- Paste or write your thread here..." spellcheck="false"></textarea>

    <div class="actions-panel">
      <button class="btn btn-silver-action" id="btnSaveScript" onclick="saveScript()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Script
      </button>
      <button class="btn btn-secondary" onclick="copyCode()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-clear-action" onclick="clearEditor()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>
  </div>

  <div id="result" class="result-vault">
    <div class="result-header">
      <div class="status-container">
        <div class="status-pulse"></div>
        <span>SAFE PROTOCOL DEPLOYED</span>
      </div>
      <span id="scriptIdLabel" class="script-id"></span>
    </div>
    <div class="result-body">

      <div class="meta-block">
        <div class="meta-label">Raw Redirect URL</div>
        <div class="display-box">
          <div class="display-text" id="rawUrlText"></div>
          <button class="btn-copy-inline" id="copyUrlBtn" onclick="copyRawUrl()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Raw URL
          </button>
        </div>
      </div>

      <div class="meta-block">
        <div class="meta-label">Executor Loadstring Structure</div>
        <div class="display-box">
          <div class="display-text" id="loadstringText" style="color: #ffffff; font-weight: 500;"></div>
          <button class="btn-copy-inline" id="copyLsBtn" onclick="copyLoadstring()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Loadstring
          </button>
        </div>
      </div>

      <div class="meta-block">
        <div class="meta-label">Public View Link</div>
        <div class="display-box">
          <div class="display-text" id="viewUrlText"></div>
          <button class="btn-copy-inline" id="copyViewBtn" onclick="copyViewUrl()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy View URL
          </button>
        </div>
      </div>

      <a id="viewLink" class="viewer-trigger" href="#" target="_blank">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Launch viewer interface
      </a>
    </div>
  </div>

  <footer>System secure // Powered by CodeVault 2026</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── LINE COUNT ── */
const codeEl = document.getElementById('code');
codeEl.addEventListener('input', function() {
  const n = codeEl.value.split('\n').length;
  document.getElementById('lineCount').textContent = n + ' line' + (n===1?'':'s');
});

/* ── TOAST NOTE ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 2200);
}

/* ── BUTTON ANIMATION ── */
function animateCopyBtn(btn, orig) {
  btn.style.background = '#ffffff';
  btn.style.color = '#000000';
  btn.innerHTML = 'COPIED TO CLIPBOARD';
  setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
}

/* ── GUARDADO LOCAL MANDATORIO ── */
async function guardarArchivoLocal(idScript, contenido) {
  if ('showSaveFilePicker' in window) {
    try {
      const opciones = {
        suggestedName: `script_${idScript}.lua`,
        types: [{
          description: 'Lua Script',
          accept: { 'text/plain': ['.lua', '.txt'] },
        }],
      };
      const handle = await window.showSaveFilePicker(opciones);
      const writable = await handle.createWritable();
      await writable.write(contenido);
      await writable.close();
      showToast('✓ Archivo guardado');
    } catch (err) {
      console.log('Cancelado.');
    }
  } else {
    const blob = new Blob([contenido], { type: 'text/plain' });
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = `script_${idScript}.lua`; 
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    showToast('✓ Descargado localmente');
  }
}

/* ── SAVE ENGINE CORE ── */
async function saveScript() {
  const code = codeEl.value.trim();
  if (!code) { showToast('Type or paste a string first'); return; }

  const btn = document.getElementById('btnSaveScript');
  btn.textContent = 'SAVING...';
  btn.disabled = true;

  try {
    const res = await fetch('https://codevault-vlv1.onrender.com/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });

    if (!res.ok) throw new Error('Network cluster error');

    const data = await res.json();
    const id   = data.id;

    localStorage.setItem('idUsuario', id);
    await guardarArchivoLocal(id, code);

    const targetFolder = localStorage.getItem("active_folder_target");
    
    if (targetFolder) {
      let scriptTitle = prompt("Asigna un nombre para el Dashboard:", "Mod Script");
      if (!scriptTitle || !scriptTitle.trim()) {
        scriptTitle = "Script-" + id.substring(0, 5).toUpperCase();
      }

      let currentLocalScripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
      currentLocalScripts.push({
        id: id,
        title: scriptTitle.trim(),
        folderId: targetFolder
      });
      
      localStorage.setItem("vault_scripts", JSON.stringify(currentLocalScripts));
      localStorage.removeItem("active_folder_target");
      
      showToast('✓ Synced to folder!');
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
      return; 
    }

    const viewUrl = 'https://CodeVoult.github.io/CodeVault/view.html?id=' + id;
    const rawUrl  = 'https://codevault-vlv1.onrender.com/raw/' + id;
    const ls      = 'loadstring(game:HttpGet("' + rawUrl + '"))()';

    document.getElementById('rawUrlText').textContent      = rawUrl;
    document.getElementById('loadstringText').textContent  = ls;
    document.getElementById('viewUrlText').textContent     = viewUrl;
    document.getElementById('scriptIdLabel').textContent   = 'ID: ' + id.toUpperCase();
    document.getElementById('viewLink').href               = viewUrl;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('✓ Saved successfully');

  } catch(e) {
    showToast('⚠ Error connecting to Render');
  } finally {
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save Script';
    btn.disabled = false;
  }
}

function copyRawUrl() {
  const url  = document.getElementById('rawUrlText').textContent;
  const btn  = document.getElementById('copyUrlBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyViewUrl() {
  const url  = document.getElementById('viewUrlText').textContent;
  const btn  = document.getElementById('copyViewBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyLoadstring() {
  const ls   = document.getElementById('loadstringText').textContent;
  const btn  = document.getElementById('copyLsBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(ls).then(() => { animateCopyBtn(btn, orig); });
}

function copyCode() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('Buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => { showToast('Code block copied'); });
}

function clearEditor() {
  codeEl.value = '';
  document.getElementById('lineCount').textContent = '1 line';
  document.getElementById('result').style.display = 'none';
  showToast('Workspace reset');
}
</script>
</body>
</html>
