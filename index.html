<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Onyx Black Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<script>
  // ── VALIDACIÓN DE ACCESO SEGURO ──
  const activeUser = localStorage.getItem("logged_user");
  const urlParams = new URLSearchParams(window.location.search);
  const vieneDeFila = urlParams.get('from') === 'dashboard';

  if (!activeUser) {
    window.location.href = "login.html";
  } else if (!vieneDeFila) {
    window.location.href = "dashboard.html";
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #070708;
  --surface-cards: #0c0c0d;
  --border: #1a1a1c;
  --border-focus: #333336;
  --text: #ffffff;
  --muted: #66666e;
  --code-bg: #040405;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 24px 100px;
}

/* ── LOGO PREMIUM & HEADER ── */
header {
  margin-bottom: 50px;
  text-align: center;
  animation: dynamicFade 0.5s cubic-bezier(.16,1,.3,1) both;
}

.logo-container {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.logo-badge {
  width: 56px;
  height: 56px;
  background: var(--surface-cards);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  position: relative;
  transition: transform 0.3s ease;
}

.logo-badge::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
  z-index: -1;
}

.logo-container:hover .logo-badge {
  transform: translateY(-2px);
  border-color: var(--border-focus);
}

.logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1.5px;
  color: var(--text);
  text-transform: uppercase;
}

.logo-text span {
  font-weight: 300;
  color: var(--muted);
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── EDITOR CARD ── */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 30px 70px rgba(0,0,0,0.9);
  animation: dynamicFade 0.6s 0.1s cubic-bezier(.16,1,.3,1) both;
  transition: border-color 0.3s ease;
}

.editor-card:focus-within { 
  border-color: var(--border-focus);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(12, 12, 13, 0.5);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.sys-indicators {
  display: flex;
  gap: 6px;
}
.indicator-dot { width: 6px; height: 6px; border-radius: 50%; background: #222224; }
.indicator-dot.active { background: #ffffff; }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text);
  font-weight: 700;
  background: #121214;
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 6px;
  letter-spacing: 0.05em;
}

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── WORKSPACE TEXTAREA ── */
textarea {
  width: 100%;
  height: 400px;
  background: transparent;
  color: #e4e4e7;
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.7;
  caret-color: var(--text);
}

textarea::placeholder { color: #333338; }

.actions-panel {
  display: flex;
  gap: 12px;
  padding: 18px 24px;
  border-top: 1px solid var(--border);
  background: rgba(12, 12, 13, 0.5);
}

/* ── PREMIUM MONOCHROME BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.16,1,.3,1);
}

.btn-primary { 
  background: #ffffff; 
  color: #000000; 
  font-weight: 700;
}

.btn-primary:hover { 
  background: #e4e4e7;
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--surface-cards);
  color: #d4d4d8;
  border: 1px solid var(--border);
}

.btn-secondary:hover { 
  color: #ffffff; 
  border-color: var(--border-focus);
  transform: translateY(-1px);
}

.btn svg { width: 14px; height: 14px; stroke-width: 2.5; }

/* ── RESULTS ARCHITECTURE ── */
.result-vault {
  margin-top: 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  display: none;
  animation: dynamicFade 0.4s ease both;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(12, 12, 13, 0.5);
}

.status-container {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.status-pulse {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ffffff;
}

.script-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.result-body { padding: 24px; }
.meta-block { margin-bottom: 24px; }
.meta-block:last-of-type { margin-bottom: 12px; }

.meta-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}

.display-box {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.display-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #a1a1aa;
  padding: 18px;
  word-break: break-all;
  line-height: 1.6;
}

.btn-copy-inline {
  width: 100%;
  background: var(--surface-cards);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-copy-inline:hover { background: #121214; color: var(--text); }

.viewer-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.viewer-trigger:hover { color: var(--text); }

/* ── SYSTEM TOAST ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ffffff;
  color: #000000;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: 10px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.4s cubic-bezier(.16,1,.3,1);
  z-index: 1000;
  letter-spacing: 0.02em;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes dynamicFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

footer {
  margin-top: 80px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #333336;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-container">
      <div class="logo-badge">⚡</div>
      <div class="logo-text">CODE<span>VAULT</span></div>
    </div>
    <div class="tagline">// SECURE SPECIFICATION ENVIRONMENT</div>
  </header>

  <div class="editor-card">
    <div class="topbar">
      <div class="topbar-left">
        <div class="sys-indicators">
          <div class="indicator-dot active"></div>
          <div class="indicator-dot"></div>
          <div class="indicator-dot"></div>
        </div>
        <span class="lang-badge">LUA</span>
      </div>
      <span class="line-count" id="lineCount">0 lines</span>
    </div>

    <textarea id="code" placeholder="-- Paste or write your thread here..." spellcheck="false"></textarea>

    <div class="actions-panel">
      <button class="btn btn-primary" id="btnSaveScript" onclick="saveScript()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Script
      </button>
      <button class="btn btn-secondary" onclick="copyCode()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-secondary" onclick="clearEditor()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>
  </div>

  <!-- PANELS DE RESULTADOS MONOCHROME -->
  <div id="result" class="result-vault">
    <div class="result-header">
      <div class="status-container">
        <div class="status-pulse"></div>
        <span>SAFE PROTOCOL DEPLOYED</span>
      </div>
      <span id="scriptIdLabel" class="script-id"></span>
    </div>
    <div class="result-body">

      <!-- RAW URL -->
      <div class="meta-block">
        <div class="meta-label">Raw Redirect URL</div>
        <div class="display-box">
          <div class="display-text" id="rawUrlText"></div>
          <button class="btn-copy-inline" id="copyUrlBtn" onclick="copyRawUrl()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Raw URL
          </button>
        </div>
      </div>

      <!-- LOADSTRING -->
      <div class="meta-block">
        <div class="meta-label">Executor Loadstring Structure</div>
        <div class="display-box">
          <div class="display-text" id="loadstringText" style="color: #ffffff; font-weight: 500;"></div>
          <button class="btn-copy-inline" id="copyLsBtn" onclick="copyLoadstring()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Loadstring
          </button>
        </div>
      </div>

      <!-- VIEW URL -->
      <div class="meta-block">
        <div class="meta-label">Public View Link</div>
        <div class="display-box">
          <div class="display-text" id="viewUrlText"></div>
          <button class="btn-copy-inline" id="copyViewBtn" onclick="copyViewUrl()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy View URL
          </button>
        </div>
      </div>

      <a id="viewLink" class="viewer-trigger" href="#" target="_blank">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Launch viewer interface
      </a>
    </div>
  </div>

  <footer>System secure // Powered by CodeVault 2026</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── LINE COUNT ── */
const codeEl = document.getElementById('code');
codeEl.addEventListener('input', function() {
  const n = codeEl.value.split('\n').length;
  document.getElementById('lineCount').textContent = n + ' line' + (n===1?'':'s');
});

/* ── TOAST NOTE ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 2200);
}

/* ── BUTTON ANIMATION ── */
function animateCopyBtn(btn, orig) {
  btn.style.background = '#ffffff';
  btn.style.color = '#000000';
  btn.innerHTML = 'COPIED TO CLIPBOARD';
  setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
}

/* ── GUARDADO LOCAL MANDATORIO ── */
async function guardarArchivoLocal(idScript, contenido) {
  if ('showSaveFilePicker' in window) {
    try {
      const opciones = {
        suggestedName: `script_${idScript}.lua`,
        types: [{
          description: 'Lua Script',
          accept: { 'text/plain': ['.lua', '.txt'] },
        }],
      };
      const handle = await window.showSaveFilePicker(opciones);
      const writable = await handle.createWritable();
      await writable.write(contenido);
      await writable.close();
      showToast('✓ Archivo guardado');
    } catch (err) {
      console.log('Cancelado.');
    }
  } else {
    const blob = new Blob([contenido], { type: 'text/plain' });
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = `script_${idScript}.lua`; 
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    showToast('✓ Descargado localmente');
  }
}

/* ── SAVE ENGINE CORE ── */
async function saveScript() {
  const code = codeEl.value.trim();
  if (!code) { showToast('Type or paste a string first'); return; }

  const btn = document.getElementById('btnSaveScript');
  btn.textContent = 'SAVING...';
  btn.disabled = true;

  try {
    const res = await fetch('https://codevault-vlv1.onrender.com/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });

    if (!res.ok) throw new Error('Network cluster error');

    const data = await res.json();
    const id   = data.id;

    localStorage.setItem('idUsuario', id);
    await guardarArchivoLocal(id, code);

    const targetFolder = localStorage.getItem("active_folder_target");
    
    if (targetFolder) {
      let scriptTitle = prompt("Asigna un nombre para el Dashboard:", "Mod Script");
      if (!scriptTitle || !scriptTitle.trim()) {
        scriptTitle = "Script-" + id.substring(0, 5).toUpperCase();
      }

      let currentLocalScripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
      currentLocalScripts.push({
        id: id,
        title: scriptTitle.trim(),
        folderId: targetFolder
      });
      
      localStorage.setItem("vault_scripts", JSON.stringify(currentLocalScripts));
      localStorage.removeItem("active_folder_target");
      
      showToast('✓ Synced to folder!');
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
      return; 
    }

    const viewUrl = 'https://CodeVoult.github.io/CodeVault/view.html?id=' + id;
    const rawUrl  = 'https://codevault-vlv1.onrender.com/raw/' + id;
    const ls      = 'loadstring(game:HttpGet("' + rawUrl + '"))()';

    document.getElementById('rawUrlText').textContent      = rawUrl;
    document.getElementById('loadstringText').textContent  = ls;
    document.getElementById('viewUrlText').textContent     = viewUrl;
    document.getElementById('scriptIdLabel').textContent   = 'ID: ' + id.toUpperCase();
    document.getElementById('viewLink').href               = viewUrl;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('✓ Saved successfully');

  } catch(e) {
    showToast('⚠ Error connecting to Render');
  } finally {
    btn.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save Script';
    btn.disabled = false;
  }
}

function copyRawUrl() {
  const url  = document.getElementById('rawUrlText').textContent;
  const btn  = document.getElementById('copyUrlBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyViewUrl() {
  const url  = document.getElementById('viewUrlText').textContent;
  const btn  = document.getElementById('copyViewBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyLoadstring() {
  const ls   = document.getElementById('loadstringText').textContent;
  const btn  = document.getElementById('copyLsBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(ls).then(() => { animateCopyBtn(btn, orig); });
}

function copyCode() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('Buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => { showToast('Code block copied'); });
}

function clearEditor() {
  codeEl.value = '';
  document.getElementById('lineCount').textContent = '0 lines';
  document.getElementById('result').style.display = 'none';
  showToast('Workspace reset');
}
</script>
</body>
</html>
