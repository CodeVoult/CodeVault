<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Ultra Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<script>
  // ── VALIDACIÓN DE ACCESO SEGURO ──
  const activeUser = localStorage.getItem("logged_user");
  const urlParams = new URLSearchParams(window.location.search);
  const vieneDeFila = urlParams.get('from') === 'dashboard';

  if (!activeUser) {
    window.location.href = "login.html";
  } else if (!vieneDeFila) {
    window.location.href = "dashboard.html";
  }
</script>

<style>
:root {
  --bg: #030303;
  --surface: #0a0a0c;
  --surface2: #101014;
  --border: #161a22;
  --border2: #22293a;
  --text: #ffffff;
  --muted: #525a6c;
  
  /* Cyberpunk Neon Theme (Cyan/Blue) */
  --neon: #00f0ff;
  --neon-glow: rgba(0, 240, 255, 0.15);
  --neon-dim: #00a8b5;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Fondo de cuadrícula Cyberpunk */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 1;
  background-image: 
    linear-gradient(to right, rgba(0, 240, 255, 0.015) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Resplandor superior */
.bg-glow {
  position: fixed;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(circle, rgba(0, 240, 255, 0.06) 0%, transparent 70%);
  z-index: 1;
  pointer-events: none;
}

#canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 10;
  max-width: 860px;
  margin: 0 auto;
  padding: 50px 20px 80px;
}

/* HEADER STYLE */
header {
  margin-bottom: 40px;
  animation: neonFadeUp 0.8s cubic-bezier(.16,1,.3,1) both;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 6px;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--neon);
  box-shadow: 0 0 15px var(--neon-glow);
  position: relative;
}

.logo-icon::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 12px;
  background: linear-gradient(45deg, var(--neon), transparent);
  z-index: -1;
  opacity: 0.4;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
}

.logo span { 
  color: var(--neon);
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.05em;
  padding-left: 58px;
  text-transform: uppercase;
}

/* NEON EDITOR CARD */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  animation: neonFadeUp 0.8s 0.1s cubic-bezier(.16,1,.3,1) both;
  transition: all 0.4s cubic-bezier(.16,1,.3,1);
}

.editor-card:hover, .editor-card:focus-within { 
  border-color: rgba(0, 240, 255, 0.3);
  box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 20px rgba(0, 240, 255, 0.03);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dots {
  display: flex;
  gap: 6px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #222; }
.dot.active-glow { background: var(--neon); box-shadow: 0 0 8px var(--neon); }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--neon);
  font-weight: 600;
  background: rgba(0, 240, 255, 0.06);
  border: 1px solid rgba(0, 240, 255, 0.15);
  padding: 3px 12px;
  border-radius: 6px;
  letter-spacing: 0.05em;
}

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

/* TEXTAREA CYBERPUNK */
textarea {
  width: 100%;
  height: 440px;
  background: transparent;
  color: #e2e8f0;
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  caret-color: var(--neon);
}

textarea::placeholder { color: #2e3545; }
textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 20px; }
textarea::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.actions {
  display: flex;
  gap: 12px;
  padding: 18px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

/* PREMIUM BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 10px;
  padding: 12px 22px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(.16,1,.3,1);
  position: relative;
  overflow: hidden;
}

.btn-primary { 
  background: var(--text); 
  color: #000; 
}

.btn-primary:hover { 
  background: var(--neon); 
  transform: translateY(-2px); 
  box-shadow: 0 8px 20px rgba(0, 240, 255, 0.25); 
}

.btn-ghost {
  background: var(--surface);
  color: #94a3b8;
  border: 1px solid var(--border2);
}

.btn-ghost:hover { 
  color: var(--text); 
  border-color: rgba(0, 240, 255, 0.4);
  transform: translateY(-2px);
  background: rgba(255,255,255,0.01);
}

.btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* THE GLOWING RESULT PANEL */
.result {
  margin-top: 24px;
  background: var(--surface);
  border: 1px solid rgba(0, 240, 255, 0.2);
  border-radius: 18px;
  overflow: hidden;
  display: none;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0, 240, 255, 0.02);
  animation: neonFadeUp 0.5s cubic-bezier(.16,1,.3,1) both;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--neon);
  font-weight: 600;
  letter-spacing: 0.05em;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--neon);
  box-shadow: 0 0 10px var(--neon);
  animation: pulse-dot 1.8s infinite;
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 8px var(--neon); }
  50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 16px var(--neon); }
}

.result-body { padding: 24px; }
.info-row { margin-bottom: 18px; }

.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.code-block {
  background: #060608;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.code-block:hover {
  border-color: var(--border2);
}

.code-block-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #cbd5e1;
  padding: 16px;
  word-break: break-all;
  line-height: 1.6;
}

.code-block-copy {
  width: 100%;
  background: var(--surface2);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.code-block-copy:hover { background: var(--border); color: var(--neon); }
.code-block-copy.copied { color: var(--neon); background: rgba(0, 240, 255, 0.03); }

.view-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.view-link-btn:hover { color: var(--neon); }

/* TOAST CYBER */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #fff;
  color: #000;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 14px 28px;
  border-radius: 12px;
  pointer-events: none;
  opacity: 0;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  transition: all 0.4s cubic-bezier(.16,1,.3,1);
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ANIMATIONS */
@keyframes neonFadeUp {
  from { opacity: 0; transform: translateY(16px); filter: blur(2px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

footer {
  margin-top: 60px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #242936;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>
<canvas id="canvas"></canvas>

<div class="container">
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </div>
    <div class="subtitle">// Matrix Storage &amp; Encryption</div>
  </header>

  <div class="editor-card">
    <div class="topbar">
      <div class="topbar-left">

          <div class="dot active-glow"></div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

      </button>
      <button class="btn btn-ghost" onclick="clearEditor()">

    </div>

      <!-- RAW URL -->
      <div class="info-row">

        <div class="code-block">
          <div class="code-block-text" id="rawUrlText"></div>
          <button class="code-block-copy" id="copyUrlBtn" onclick="copyRawUrl()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Raw URL
          </button>

      <!-- LOADSTRING -->
      <div class="info-row">
        <div class="row-label">Executor Loadstring Structure</div>
        <div class="code-block">
          <div class="code-block-text" id="loadstringText" style="color: var(--neon);"></div>
          <button class="code-block-copy" id="copyLsBtn" onclick="copyLoadstring()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Loadstring
          </button>

      <!-- VIEW URL -->
      <div class="info-row">
        <div class="row-label">Public View Link</div>
        <div class="code-block">
          <div class="code-block-text" id="viewUrlText"></div>
          <button class="code-block-copy" id="copyViewBtn" onclick="copyViewUrl()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

        Launch viewer interface
      </a>

  <footer>System secure // Powered by CodeVault 2026</footer>

<div class="toast" id="toast"></div>

<script>
/* ── ULTRA DEEP PARTICLES SYSTEM ── */
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.2;
    this.vy = -(Math.random() * 0.25 + 0.05);
    this.r  = Math.random() * 1 + 0.4;
    this.alpha = Math.random() * 0.2 + 0.05;
    this.life  = 0;
    this.maxLife = Math.random() * 500 + 400;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxLife;
    const fade = p < 0.1 ? p/0.1 : p > 0.8 ? 1-(p-0.8)/0.2 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0, 240, 255,' + (this.alpha * fade) + ')'; // Cyan particles
    ctx.fill();
  }
}

const particles = Array.from({length: 60}, () => new Particle()); // Menos partículas para mejor performance móvil

(function animate() {
  ctx.clearRect(0,0,W,H);
  for (let i=0; i<particles.length; i++) {
    for (let j=i+1; j<particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < 90){
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = 'rgba(0, 240, 255,' + (1 - d/90) * 0.03 + ')';
        ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
  }
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
})();

/* ── LINE COUNT ── */
const codeEl = document.getElementById('code');
codeEl.addEventListener('input', function() {
  const n = codeEl.value.split('\n').length;
  document.getElementById('lineCount').textContent = n + ' line' + (n===1?'':'s');
});

/* ── TOAST NOTE ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 2200);
}

/* ── BUTTON ANIMATION ── */
function animateCopyBtn(btn, orig) {
  btn.classList.add('copied');
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> SECURED IN CLIPBOARD';
  setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
}

/* ── ALMACENAMIENTO LOCAL MANDATORIO ── */
async function guardarArchivoLocal(idScript, contenido) {
  if ('showSaveFilePicker' in window) {
    try {
      const opciones = {
        suggestedName: `script_${idScript}.lua`,
        types: [{
          description: 'Lua Script',
          accept: { 'text/plain': ['.lua', '.txt'] },
        }],
      };
      const handle = await window.showSaveFilePicker(opciones);
      const writable = await handle.createWritable();
      await writable.write(contenido);
      await writable.close();
      showToast('✓ Archivo guardado con éxito');
    } catch (err) {
      console.log('Cancelado.');
    }
  } else {
    const blob = new Blob([contenido], { type: 'text/plain' });
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = `script_${idScript}.lua`; 
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    showToast('✓ Descargado en memoria interna');
  }
}

/* ── SAVE ENGINE CORE ── */
async function saveScript() {
  const code = codeEl.value.trim();
  if (!code) { showToast('Type or paste a string first'); return; }

  const btn = document.getElementById('btnSaveScript');
  btn.textContent = 'ENCRYPTING...';
  btn.disabled = true;

  try {
    const res = await fetch('https://codevault-vlv1.onrender.com/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });

    if (!res.ok) throw new Error('Network cluster error');

    const data = await res.json();
    const id   = data.id;

    localStorage.setItem('idUsuario', id);
    await guardarArchivoLocal(id, code);

    const targetFolder = localStorage.getItem("active_folder_target");
    
    if (targetFolder) {
      let scriptTitle = prompt("Asigna un nombre para el Dashboard:", "Mod Script");
      if (!scriptTitle || !scriptTitle.trim()) {
        scriptTitle = "Script-" + id.substring(0, 5).toUpperCase();
      }

      let currentLocalScripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
      currentLocalScripts.push({
        id: id,
        title: scriptTitle.trim(),
        folderId: targetFolder
      });
      
      localStorage.setItem("vault_scripts", JSON.stringify(currentLocalScripts));
      localStorage.removeItem("active_folder_target");
      
      showToast('✓ Synced to dashboard folder!');
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
      return; 
    }

    const viewUrl = 'https://leeh10.github.io/CodeVault/view.html?id=' + id;
    const rawUrl  = 'https://codevault-vlv1.onrender.com/raw/' + id;
    const ls      = 'loadstring(game:HttpGet("' + rawUrl + '"))()';

    document.getElementById('rawUrlText').textContent      = rawUrl;
    document.getElementById('loadstringText').textContent  = ls;
    document.getElementById('viewUrlText').textContent     = viewUrl;
    document.getElementById('scriptIdLabel').textContent   = 'ID: ' + id.toUpperCase();
    document.getElementById('viewLink').href               = viewUrl;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('✓ Database updated successfully');

  } catch(e) {
    showToast('⚠ Cluster Render connection dropped');
  } finally {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save Script';
    btn.disabled = false;
  }
}

function copyRawUrl() {
  const url  = document.getElementById('rawUrlText').textContent;
  const btn  = document.getElementById('copyUrlBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyViewUrl() {
  const url  = document.getElementById('viewUrlText').textContent;
  const btn  = document.getElementById('copyViewBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyLoadstring() {
  const ls   = document.getElementById('loadstringText').textContent;
  const btn  = document.getElementById('copyLsBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(ls).then(() => { animateCopyBtn(btn, orig); });
}

function copyCode() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('Buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => { showToast('Code block copied'); });
}

function clearEditor() {
  codeEl.value = '';
  document.getElementById('lineCount').textContent = '0 lines';
  document.getElementById('result').style.display = 'none';
  showToast('Workspace reset');
}
</script>
</body>
</html>
