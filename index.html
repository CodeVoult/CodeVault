<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Black Edition</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

<script>
  // ── VALIDACIÓN DE ACCESO SEGURO ──
  const activeUser = localStorage.getItem("logged_user");
  const urlParams = new URLSearchParams(window.location.search);
  const vieneDeFila = urlParams.get('from') === 'dashboard';

  if (!activeUser) {
    window.location.href = "login.html";
  } else if (!vieneDeFila) {
    window.location.href = "dashboard.html";
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --surface2: #121212;
  --border: #1f1f1f;
  --border2: #2e2e2e;
  --text: #ffffff;
  --muted: #707070;
  --accent: #ffffff;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  position: relative;
  max-width: 860px;
  margin: 0 auto;
  padding: 50px 20px 80px;
}

/* HEADER STYLE - MONOCHROME */
header {
  margin-bottom: 40px;
  animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 6px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--text);
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--text);
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
  padding-left: 52px;
  text-transform: uppercase;
}

/* CARDS WITH CLEAN BORDERS */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  animation: fadeUp 0.6s 0.1s cubic-bezier(.16,1,.3,1) both;
  transition: border-color 0.25s ease;
}

.editor-card:hover, .editor-card:focus-within { 
  border-color: var(--border2);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.dots {
  display: flex;
  gap: 6px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #262626; }
.dot.active { background: #ffffff; }

.lang-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text);
  font-weight: 600;
  background: #161616;
  border: 1px solid var(--border);
  padding: 2px 10px;
  border-radius: 4px;
}

.line-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

/* TEXTAREA */
textarea {
  width: 100%;
  height: 420px;
  background: transparent;
  color: #e2e8f0;
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  caret-color: var(--text);
}

textarea::placeholder { color: #3a3a3a; }
textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

.actions {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

/* BUTTONS BLACK & WHITE */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

.btn-primary { 
  background: #ffffff; 
  color: #000000; 
}

.btn-primary:hover { 
  background: #e5e5e5;
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: #a3a3a3;
  border: 1px solid var(--border);
}

.btn-ghost:hover { 
  color: #ffffff; 
  border-color: #ffffff;
  transform: translateY(-1px);
}

.btn svg { width: 14px; height: 14px; }

/* PANEL DE RESULTADOS */
.result {
  margin-top: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: none;
  animation: fadeUp 0.4s ease both;
}

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #ffffff;
  font-weight: 600;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ffffff;
}

.result-body { padding: 24px; }
.info-row { margin-bottom: 20px; }

.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
  letter-spacing: 0.05em;
}

.code-block {
  background: #050505;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.code-block-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #d4d4d4;
  padding: 16px;
  word-break: break-all;
  line-height: 1.6;
}

.code-block-copy {
  width: 100%;
  background: var(--surface2);
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.code-block-copy:hover { background: #1a1a1a; color: #ffffff; }

.view-link-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
}
.view-link-btn:hover { color: #ffffff; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ffffff;
  color: #000000;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 24px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.3s cubic-bezier(.16,1,.3,1);
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

footer {
  margin-top: 60px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #404040;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">■</div>
      <div class="logo">CodeVault</div>
    </div>
    <div class="subtitle">// Storage Hub &amp; Encryption</div>
  </header>

  <div class="editor-card">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <span class="lang-badge">LUA</span>
      </div>
      <span class="line-count" id="lineCount">0 lines</span>
    </div>

    <textarea id="code" placeholder="-- Drop your execution thread here..." spellcheck="false"></textarea>

    <div class="actions">
      <button class="btn btn-primary" id="btnSaveScript" onclick="saveScript()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Script
      </button>
      <button class="btn btn-ghost" onclick="copyCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-ghost" onclick="clearEditor()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>
  </div>

  <!-- PANELS DE RESULTADOS MONOCHROME -->
  <div id="result" class="result">
    <div class="result-header">
      <div class="status-row">
        <div class="status-dot"></div>
        <span>SAFE PROTOCOL DEPLOYED</span>
      </div>
      <span id="scriptIdLabel" style="color: #ffffff; font-family: 'JetBrains Mono';"></span>
    </div>
    <div class="result-body">

      <!-- RAW URL -->
      <div class="info-row">
        <div class="row-label">Raw Redirect URL</div>
        <div class="code-block">
          <div class="code-block-text" id="rawUrlText"></div>
          <button class="code-block-copy" id="copyUrlBtn" onclick="copyRawUrl()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Raw URL
          </button>
        </div>
      </div>

      <!-- LOADSTRING -->
      <div class="info-row">
        <div class="row-label">Executor Loadstring Structure</div>
        <div class="code-block">
          <div class="code-block-text" id="loadstringText" style="color: #ffffff;"></div>
          <button class="code-block-copy" id="copyLsBtn" onclick="copyLoadstring()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Loadstring
          </button>
        </div>
      </div>

      <!-- VIEW URL -->
      <div class="info-row">
        <div class="row-label">Public View Link</div>
        <div class="code-block">
          <div class="code-block-text" id="viewUrlText"></div>
          <button class="code-block-copy" id="copyViewBtn" onclick="copyViewUrl()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy View URL
          </button>
        </div>
      </div>

      <a id="viewLink" class="view-link-btn" href="#" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Launch viewer interface
      </a>
    </div>
  </div>

  <footer>System secure // Powered by CodeVault 2026</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── LINE COUNT ── */
const codeEl = document.getElementById('code');
codeEl.addEventListener('input', function() {
  const n = codeEl.value.split('\n').length;
  document.getElementById('lineCount').textContent = n + ' line' + (n===1?'':'s');
});

/* ── TOAST NOTE ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 2200);
}

/* ── BUTTON ANIMATION ── */
function animateCopyBtn(btn, orig) {
  btn.style.background = '#ffffff';
  btn.style.color = '#000000';
  btn.innerHTML = 'COPIED TO CLIPBOARD';
  setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; btn.style.color = ''; }, 2000);
}

/* ── GUARDADO LOCAL MANDATORIO ── */
async function guardarArchivoLocal(idScript, contenido) {
  if ('showSaveFilePicker' in window) {
    try {
      const opciones = {
        suggestedName: `script_${idScript}.lua`,
        types: [{
          description: 'Lua Script',
          accept: { 'text/plain': ['.lua', '.txt'] },
        }],
      };
      const handle = await window.showSaveFilePicker(opciones);
      const writable = await handle.createWritable();
      await writable.write(contenido);
      await writable.close();
      showToast('✓ Archivo guardado');
    } catch (err) {
      console.log('Cancelado.');
    }
  } else {
    const blob = new Blob([contenido], { type: 'text/plain' });
    const enlace = document.createElement('a');
    enlace.href = URL.createObjectURL(blob);
    enlace.download = `script_${idScript}.lua`; 
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    showToast('✓ Descargado localmente');
  }
}

/* ── SAVE ENGINE CORE ── */
async function saveScript() {
  const code = codeEl.value.trim();
  if (!code) { showToast('Type or paste a string first'); return; }

  const btn = document.getElementById('btnSaveScript');
  btn.textContent = 'SAVING...';
  btn.disabled = true;

  try {
    const res = await fetch('https://codevault-vlv1.onrender.com/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    });

    if (!res.ok) throw new Error('Network cluster error');

    const data = await res.json();
    const id   = data.id;

    localStorage.setItem('idUsuario', id);
    await guardarArchivoLocal(id, code);

    const targetFolder = localStorage.getItem("active_folder_target");
    
    if (targetFolder) {
      let scriptTitle = prompt("Asigna un nombre para el Dashboard:", "Mod Script");
      if (!scriptTitle || !scriptTitle.trim()) {
        scriptTitle = "Script-" + id.substring(0, 5).toUpperCase();
      }

      let currentLocalScripts = JSON.parse(localStorage.getItem("vault_scripts")) || [];
      currentLocalScripts.push({
        id: id,
        title: scriptTitle.trim(),
        folderId: targetFolder
      });
      
      localStorage.setItem("vault_scripts", JSON.stringify(currentLocalScripts));
      localStorage.removeItem("active_folder_target");
      
      showToast('✓ Synced to folder!');
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
      return; 
    }

    const viewUrl = 'https://CodeVoult.github.io/CodeVault/view.html?id=' + id;
    const rawUrl  = 'https://codevault-vlv1.onrender.com/raw/' + id;
    const ls      = 'loadstring(game:HttpGet("' + rawUrl + '"))()';

    document.getElementById('rawUrlText').textContent      = rawUrl;
    document.getElementById('loadstringText').textContent  = ls;
    document.getElementById('viewUrlText').textContent     = viewUrl;
    document.getElementById('scriptIdLabel').textContent   = 'ID: ' + id.toUpperCase();
    document.getElementById('viewLink').href               = viewUrl;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    showToast('✓ Saved successfully');

  } catch(e) {
    showToast('⚠ Error connecting to Render');
  } finally {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save Script';
    btn.disabled = false;
  }
}

function copyRawUrl() {
  const url  = document.getElementById('rawUrlText').textContent;
  const btn  = document.getElementById('copyUrlBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyViewUrl() {
  const url  = document.getElementById('viewUrlText').textContent;
  const btn  = document.getElementById('copyViewBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(url).then(() => { animateCopyBtn(btn, orig); });
}

function copyLoadstring() {
  const ls   = document.getElementById('loadstringText').textContent;
  const btn  = document.getElementById('copyLsBtn');
  const orig = btn.innerHTML;
  navigator.clipboard.writeText(ls).then(() => { animateCopyBtn(btn, orig); });
}

function copyCode() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('Buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => { showToast('Code block copied'); });
}

function clearEditor() {
  codeEl.value = '';
  document.getElementById('lineCount').textContent = '0 lines';
  document.getElementById('result').style.display = 'none';
  showToast('Workspace reset');
}
</script>
</body>
</html>
