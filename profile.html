<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Edit Profile Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040404; --surface: #0a0a0a; --surface2: #121212;
  --border: #1c1c1c; --border2: #282828; --text: #f5f5f5; --muted: #666666;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; padding: 40px 20px; }
.profile-card {
  max-width: 500px; margin: 60px auto; background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
h2 { font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600; margin-bottom: 24px; }
.avatar-preview-box { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.p-avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; background: #222; border: 2px solid var(--border2); }
label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
input {
  width: 100%; padding: 12px 14px; margin-bottom: 20px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; color: white; font-family: 'Space Grotesk'; font-size: 14px;
}
input:focus { border-color: var(--border2); outline: none; }
.actions { display: flex; justify-content: flex-end; gap: 12px; }
.btn { padding: 10px 18px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'Space Grotesk'; }
.btn-save { background: var(--text); color: #040404; }
.btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); text-decoration: none; display: inline-flex; align-items: center; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #040404; padding: 12px 22px; border-radius: 6px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s ease; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="profile-card">
  <h2>Edit Profile Settings</h2>
  
  <div class="avatar-preview-box">
    <img id="avatarPreview" class="p-avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3.33-8-3.33y'/%3E%3C/svg%3E">
    <div>
      <p style="font-size: 14px; font-weight: 600;">Profile Identity Image</p>
      <p style="font-size: 11px; color: var(--muted);">Provide an external URL for your image avatar</p>
    </div>
  </div>

  <label>Profile Display Name</label>
  <input type="text" id="profileName" placeholder="Enter custom alias">

  <label>Profile Avatar Picture URL</label>
  <input type="text" id="profileAvatarUrl" placeholder="https://example.com/image.png" oninput="updateAvatarPreview(this.value)">

  <div class="actions">
    <a href="dashboard.html" class="btn btn-cancel">Cancel</a>
    <button class="btn btn-save" onclick="saveProfileChanges()">Save Changes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const activeUser = localStorage.getItem("logged_user");
if(!activeUser) { window.location.href = "login.html"; }

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

function updateAvatarPreview(url) {
  const img = document.getElementById("avatarPreview");
  if(url.trim()) { img.src = url.trim(); }
}

// Carga de Datos Actuales del LocalStorage
const users = JSON.parse(localStorage.getItem("vault_users")) || {};
if(users[activeUser]) {
  document.getElementById("profileName").value = users[activeUser].displayName || activeUser;
  document.getElementById("profileAvatarUrl").value = users[activeUser].avatarUrl || "";
  if(users[activeUser].avatarUrl) {
    document.getElementById("avatarPreview").src = users[activeUser].avatarUrl;
  }
}

function saveProfileChanges() {
  const targetName = document.getElementById("profileName").value.trim();
  const targetAvatar = document.getElementById("profileAvatarUrl").value.trim();
  
  if(!targetName) return showToast("⚠️ Display Name cannot be empty");

  let users = JSON.parse(localStorage.getItem("vault_users")) || {};
  if(users[activeUser]) {
    users[activeUser].displayName = targetName;
    users[activeUser].avatarUrl = targetAvatar;
    localStorage.setItem("vault_users", JSON.stringify(users));
    showToast("✓ Profile changes updated successfully!");
    setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
  }
}
</script>
</body>
</html>
