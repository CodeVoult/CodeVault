<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — View Script</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
  // ── INTERCEPTOR AUTOMÁTICO PARA EJECUTORES DE ROBLOX (MODO RAW DETECT) ──
  const urlParams = new URLSearchParams(window.location.search);
  const idScript = urlParams.get('id') || localStorage.getItem('idUsuario');
  const esRawMode = urlParams.get('raw') === 'true';

  if (esRawMode && idScript) {
    // Apunta al subdominio activo sin corromper la interfaz visual si se solicita raw externo
    fetch('https://codevault-vlv1.onrender.com/raw/' + idScript)
      .then(res => res.text())
      .then(luaCode => {
        document.open("text/plain");
        document.write(luaCode);
        document.close();
      })
      .catch(() => {
        document.open("text/plain");
        document.write('-- Error: No se pudo conectar con el servidor CodeVault.');
        document.close();
      });
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #050506;
  --surface2: #0b0b0d;
  --border: #131315;
  --border2: #222225;
  --text: #ffffff;
  --muted: #4a4a52;
  --silver-glow: rgba(255, 255, 255, 0.07);
  --silver-border: rgba(255, 255, 255, 0.16);
  --ease-premium: cubic-bezier(.16, 1, .3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.3;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* BACK LINK CORREGIDO AL DASHBOARD */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.3s var(--ease-premium);
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  animation: fadeUpPremium 0.6s var(--ease-premium) both;
}
.back-link:hover { color: var(--text); transform: translateX(-2px); }
.back-link svg { width: 12px; height: 12px; }

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  animation: fadeUpPremium 0.8s var(--ease-premium) both;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.logo-icon {
  width: 34px;
  height: 34px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  color: var(--text);
  transition: all 0.3s var(--ease-premium);
}

.logo-wrap:hover .logo-icon {
  border-color: #fff;
  box-shadow: 0 0 15px var(--silver-glow);
}

.logo {
  font-family: 'Geist Mono', monospace;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.5px;
}

.logo span { color: var(--muted); font-weight: 400; }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* STATUS BAR */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  animation: fadeUpPremium 0.8s 0.05s var(--ease-premium) both;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  transition: all 0.3s;
}

.status-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #222;
  transition: background 0.4s;
}

.status-pill.loading .dot { background: #8e8e93; animation: blink 1s infinite; }
.status-pill.ready .dot   { background: #ffffff; box-shadow: 0 0 10px rgba(255,255,255,0.7); animation: pulse-dot 2.5s infinite; }
.status-pill.editing .dot { background: #f5a623; box-shadow: 0 0 10px rgba(245,166,35,0.6); }
.status-pill.error .dot   { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.6); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 8px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 16px rgba(255,255,255,0.6)} }

.script-id {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* EDITOR CARD CON EFECTOS PLATEADOS */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  animation: fadeUpPremium 0.8s 0.1s var(--ease-premium) both;
  transition: border-color 0.4s var(--ease-premium), box-shadow 0.4s var(--ease-premium);
}

.editor-card:hover, .editor-card.edit-mode {
  border-color: var(--silver-border);
  box-shadow: 0 24px 60px rgba(0,0,0,0.8), 0 0 30px var(--silver-glow);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.dot-d { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); }

.lang-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--border);
  padding: 3px 10px;
  border-radius: 6px;
}

.mode-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 500;
  transition: all 0.3s;
}

.mode-badge.readonly { color: var(--muted); background: transparent; border: 1px solid var(--border); }
.mode-badge.editing  { color: #f5a623; background: rgba(245,166,35,0.03); border: 1px solid rgba(245,166,35,0.2); }

.line-count {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

textarea {
  width: 100%;
  height: 460px;
  background: transparent;
  color: var(--text);
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  caret-color: white;
  transition: color 0.3s var(--ease-premium);
}

textarea[readonly] {
  color: #8a8a93;
  cursor: default;
}

textarea::-webkit-scrollbar { width: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.bottombar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  flex-wrap: wrap;
}

/* BUTTONS PLATINO PRESTIGE */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 8px;
  padding: 10px 18px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s var(--ease-premium);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
}

.btn::after {
  content:'';
  position:absolute;
  inset:0;
  background:white;
  opacity:0;
  transition:opacity 0.15s;
  border-radius:inherit;
}

.btn:active::after { opacity:0.08; }
.btn svg { width:14px; height:14px; flex-shrink:0; }

.btn-primary { background: var(--text); color: #000000; }
.btn-primary:hover { background: #e1e1e6; transform: translateY(-1px); box-shadow: 0 10px 25px rgba(255,255,255,0.1); }

.btn-ghost {
  background: transparent;
  color: #a1a1aa;
  border: 1px solid var(--border2);
}
.btn-ghost:hover { color: var(--text); border-color: #ffffff; transform: translateY(-1px); box-shadow: 0 0 15px var(--silver-glow); }

.btn-edit-mode {
  background: transparent;
  color: #a1a1aa;
  border: 1px solid var(--border);
}
.btn-edit-mode:hover { color: var(--text); border-color: var(--border2); transform: translateY(-1px); }

.btn-save {
  background: var(--text);
  color: #000000;
  display: none;
}
.btn-save:hover { background: #e1e1e6; transform: translateY(-1px); }

.btn-danger {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  display: none;
}
.btn-danger:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.02); transform: translateY(-1px); }

/* LOADSTRING SECTION */
.ls-section {
  margin-top: 20px;
  animation: fadeUpPremium 0.5s var(--ease-premium) both;
  display: none;
}

.ls-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.4s var(--ease-premium);
}
.ls-card:hover { border-color: var(--border2); }

.ls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.ls-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.ls-ready {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: #ffffff;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ls-ready::before {
  content:'';
  display:inline-block;
  width:5px; height:5px;
  background:#ffffff;
  border-radius:50%;
  box-shadow: 0 0 8px #ffffff;
}

.ls-code {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: #a1a1aa;
  padding: 18px 20px;
  word-break: break-all;
  line-height: 1.7;
  user-select: all;
}

.ls-copy-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s var(--ease-premium);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.ls-copy-btn:hover { background: var(--surface2); color: var(--text); }
.ls-copy-btn.copied { color: #ffffff; background: rgba(255,255,255,0.01); }
.ls-copy-btn svg { width:14px; height:14px; }

/* TOAST ULTRA CLEAN */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #000000;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 22px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.4s var(--ease-premium);
  z-index: 100;
  white-space: nowrap;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ANIMACIÓN MEJORADA CON BLUR DIFUMINADO */
@keyframes fadeUpPremium {
  from { opacity:0; transform: translateY(16px); filter: blur(4px); }
  to   { opacity:1; transform: translateY(0); filter: blur(0); }
}

footer {
  margin-top: 54px;
  text-align: center;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #18181b;
  animation: fadeUpPremium 0.8s 0.3s var(--ease-premium) both;
}
</style>
</head>

<canvas id="canvas"></canvas>

<div class="container">

  <a class="back-link" href="dashboard.html">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    back to dashboard
  </a>

  <header>
    <a class="logo-wrap" href="dashboard.html">

    </a>
    <div class="header-actions">
      <button id="btnEdit" class="btn btn-edit-mode" onclick="enableEdit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Script
      </button>
      <button id="btnSave" class="btn btn-save" onclick="saveChanges()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>

  <div class="status-bar">

  <div class="editor-card" id="editorCard">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dot-d"></div>
        <div class="dot-d"></div>
        <div class="dot-d"></div>

      </div>

    </div>

    <textarea id="code" placeholder="Awaiting handshake with remote cluster..." readonly spellcheck="false"></textarea>

      <button class="btn btn-ghost" onclick="copyScript()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button class="btn btn-primary" onclick="copyLoadstring()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 17 l6-6-6-6"/><path d="M12 19h8"/></svg>

  <div class="ls-section" id="lsSection">
    <div class="ls-card">
      <div class="ls-header">
        <span class="ls-label">loadstring · executor deployment</span>
        <span class="ls-ready">live execution buffer</span>
      </div>
      <div class="ls-code" id="lsCode"></div>
      <button class="ls-copy-btn" id="lsCopyBtn" onclick="copyLoadstringFromPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Loadstring Payload
      </button>
    </div>
  </div>

  <footer>© 2026 CodeVault — all scripts encrypted at rest</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── BACKGROUND PARTICLES (MINIMALIST & SMOOTH) ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.12;
    this.vy = -(Math.random() * 0.18 + 0.04);
    this.r = Math.random() * 0.8 + 0.3;
    this.alpha = Math.random() * 0.2 + 0.05;
    this.life = 0;
    this.maxLife = Math.random() * 600 + 300;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxLife;
    const fade = p < 0.1 ? p / 0.1 : p > 0.8 ? 1 - (p - 0.8) / 0.2 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * fade})`;
    ctx.fill();
  }
}

for (let i = 0; i < 35; i++) particles.push(new Particle());

(function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
})();

/* ── UI CORE STATE & LOGIC COMPLETAS ── */
let scriptId = '';
let originalCode = '';

function getId() {
  let id = new URLSearchParams(window.location.search).get('id');
  if (!id) {
    id = localStorage.getItem('idUsuario');
  }
  return id;
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const span = document.getElementById('statusText');
  pill.className = 'status-pill ' + type;
  span.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateLineCount(val) {
  const lines = val ? val.split('\n').length : 0;
  document.getElementById('lineCount').textContent = `${lines} line${lines === 1 ? '' : 's'}`;
}

/* ── DATA FETCH OPTIMIZADO: SIN INTERFERENCIAS EN TU BACKEND ── */
async function loadScript() {
  scriptId = getId();
  
  if (!scriptId) { 
    setStatus('error', 'Handshake aborted: Void Target ID'); 
    document.getElementById('code').value = "-- [System Error]: No linked execution identifier found in session scope.";
    showToast('⚠ Script identifier missing');
    return; 
  }

  document.getElementById('scriptIdLabel').textContent = `#${scriptId.toUpperCase()}`;

  const rawUrlForExecutor = 'https://codevault-vlv1.onrender.com/raw/' + scriptId;
  const ls = 'loadstring(game:HttpGet("' + rawUrlForExecutor + '"))()';

  document.getElementById('lsCode').textContent = ls;
  document.getElementById('lsSection').style.display = 'block';

  let intentos = 0;
  const maxIntentos = 3;

  async function intentarFetch() {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 40000);

      setStatus('loading', intentos > 0 ? `Waking up server (Attempt ${intentos + 1})...` : 'Synchronizing remote clusters...');

      const res = await fetch('https://codevault-vlv1.onrender.com/raw/' + scriptId, { signal: controller.signal });
      clearTimeout(timeoutId);

      if (!res.ok) throw new Error();
      const code = await res.text();
      
      document.getElementById('code').value = code;
      originalCode = code;
      updateLineCount(code);
      setStatus('ready', 'Synchronized — Safe Scope');
      showToast('✓ Pipeline sync successful');
    } catch (err) {
      intentos++;
      if (intentos < maxIntentos) {
        setStatus('loading', `Server cold boot detected. Retrying in 3s...`);
        setTimeout(intentarFetch, 3000);
      } else {
        setStatus('error', 'Handshake timeout');
        showToast('⚠ Fetch aborted: Remote cluster sleeping');
      }
    }
  }

  intentarFetch();
}

document.getElementById('code').addEventListener('input', function() {
  updateLineCount(this.value);
});

/* ── INTERFACES & CONTROLS INTERNOS COMPLETOS ── */
function enableEdit() {
  const ta = document.getElementById('code');
  ta.readOnly = false;
  ta.focus();
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = 'inline-flex';
  document.getElementById('btnCancel').style.display = 'inline-flex';
  document.getElementById('editorCard').classList.add('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge editing';
  document.getElementById('modeBadge').textContent = 'EDITING';
  setStatus('editing', 'Staging code modifications');
}

function cancelEdit() {
  const ta = document.getElementById('code');
  ta.value = originalCode;
  ta.readOnly = true;
  updateLineCount(originalCode);
  document.getElementById('btnEdit').style.display = 'inline-flex';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('editorCard').classList.remove('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge readonly';
  document.getElementById('modeBadge').textContent = 'READ-ONLY';
  setStatus('ready', 'Synchronized — Safe Scope');
  showToast('Modifications discarded');
}

async function saveChanges() {
  const ta = document.getElementById('code');
  const updated = ta.value;
  if (!updated.trim()) { showToast('⚠ Cluster allocation layout cannot be empty'); return; }

  setStatus('loading', 'Pushing runtime patch...');

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 40000);

    const res = await fetch('https://codevault-vlv1.onrender.com/update/' + scriptId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: updated }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) throw new Error();

    originalCode = updated;
    ta.readOnly = true;
    document.getElementById('btnEdit').style.display = 'inline-flex';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('editorCard').classList.remove('edit-mode');
    document.getElementById('modeBadge').className = 'mode-badge readonly';
    document.getElementById('modeBadge').textContent = 'READ-ONLY';
    setStatus('ready', 'Synchronized — Safe Scope');
    showToast('✓ Pipeline cloud updated');
  } catch {
    setStatus('error', 'Patch execution failed');
    showToast('⚠ Error committing changes to server');
  }
}

/* ── CLIPBOARD ENGINE ── */
function copyScript() {
  const code = document.getElementById('code').value;
  if (!code.trim()) { showToast('⚠ Editor buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✓ Script text mapped to clipboard'));
}

function copyLoadstring() {
  const ls = document.getElementById('lsCode').textContent;
  if (!ls) { showToast('⚠ Reference pipeline empty'); return; }
  navigator.clipboard.writeText(ls).then(() => showToast('✓ Execution payload mapped'));
}

function copyLoadstringFromPanel() {
  const ls = document.getElementById('lsCode').textContent;
  const btn = document.getElementById('lsCopyBtn');
  navigator.clipboard.writeText(ls).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Payload Transferred!`;
    showToast('✓ Loadstring copied');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring Payload`;
    }, 2000);
  });
}

// Inicialización de la secuencia de datos sin interrupción
loadScript();
