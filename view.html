<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — Premium Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
  // ── INTERCEPTOR AUTOMÁTICO PARA EJECUTORES DE ROBLOX (MODO RAW DETECT) ──
  const urlParams = new URLSearchParams(window.location.search);
  const idScript = urlParams.get('id') || localStorage.getItem('idUsuario');
  const esRawMode = urlParams.get('raw') === 'true';

  if (esRawMode && idScript) {
    fetch('https://codevault-vlv1.onrender.com/web/raw/' + idScript)
      .then(res => res.text())
      .then(luaCode => {
        document.open("text/plain");
        document.write(luaCode);
        document.close();
      })
      .catch(() => {
        document.open("text/plain");
        document.write('-- Error: No se pudo conectar con el servidor CodeVault.');
        document.close();
      });
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #000000;
  --surface2: #050505;
  --border: #141416;
  --border2: #262629;
  --text: #ffffff;
  --muted: #52525b;
  --silver-glow: rgba(255, 255, 255, 0.04);
  --silver-border: rgba(255, 255, 255, 0.3);
  --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  position: relative;
  max-width: 920px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* ── LINK VOLVER ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.4s var(--ease-premium);
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.back-link:hover { color: var(--text); transform: translateX(-4px); }
.back-link svg { width: 12px; height: 12px; }

/* ── HEADER & LOGO FIJO ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.logo-static {
  display: flex;
  align-items: center;
  gap: 14px;
  user-select: none;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: #0a0a0a;
  border: 1px solid var(--border2);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--text);
  box-shadow: 0 0 15px rgba(255,255,255,0.02);
}

.logo {
  font-family: 'Geist Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.8px;
}
.logo span { color: var(--muted); font-weight: 300; }

.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── STATUS PIPELINE ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
}

.status-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #222;
}

.status-pill.loading .dot { background: #ffffff; animation: blink 1s infinite; }
.status-pill.ready .dot   { background: #ffffff; box-shadow: 0 0 10px #fff; }
.status-pill.editing .dot { background: #ffffff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }
.status-pill.error .dot   { background: #ef4444; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.script-id {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── CONTEXTO DEL EDITOR ESTILO GITHUB ── */
.editor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.5s var(--ease-premium), box-shadow 0.5s var(--ease-premium);
}

.editor-card:hover, .editor-card.edit-mode {
  border-color: var(--border2);
  box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 30px var(--silver-glow);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot-d { width: 7px; height: 7px; border-radius: 50%; background: #1f1f23; }

.lang-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: #0d0d0f;
  padding: 3px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
}

.mode-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  font-weight: 500;
}
.mode-badge.readonly { color: var(--muted); border: 1px solid var(--border); }
.mode-badge.editing  { color: #ffffff; border: 1px solid #ffffff; }

.line-count {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── ARQUITECTURA GITHUB LINES CONTAINER ── */
.editor-workspace {
  display: flex;
  background: #000000;
  position: relative;
  min-height: 460px;
}

.line-numbers {
  width: 48px;
  text-align: right;
  padding: 24px 12px 24px 0;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: #2b2b30;
  user-select: none;
  background: #020202;
  border-right: 1px solid var(--border);
}

.textarea-container {
  flex: 1;
  position: relative;
}

textarea {
  width: 100%;
  height: 100%;
  min-height: 460px;
  background: transparent;
  color: #d4d4d8;
  border: none;
  outline: none;
  padding: 24px;
  resize: none;
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  line-height: 1.8;
  caret-color: white;
  display: block;
}
textarea[readonly] { color: #71717a; cursor: default; }

.bottombar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

/* ── BOTONES PREMIUM CON EFECTO RECORRIDO DE LUZ PLATEADA ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
  border-radius: 8px;
  padding: 11px 20px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  transition: transform 0.3s var(--ease-premium), box-shadow 0.3s var(--ease-premium);
}

/* Base de Animación Shimmer Metálica */
.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -150%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    rgba(255, 255, 255, 0.25),
    transparent
  );
  transform: skewX(-25deg);
  animation: silverGlowWalk 4s infinite ease-in-out;
}

@keyframes silverGlowWalk {
  0% { left: -150%; }
  30% { left: 150%; }
  100% { left: 150%; }
}

.btn-silver {
  background: #ffffff;
  color: #000000;
}
.btn-silver:hover {
  background: #e4e4e7;
  transform: translateY(-2px);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
}

.btn-ghost { 
  background: #050506; 
  color: #d4d4d8; 
  border: 1px solid var(--border2); 
}
.btn-ghost:hover { 
  color: var(--text); 
  border-color: #ffffff; 
  transform: translateY(-2px); 
  box-shadow: 0 0 15px rgba(255,255,255,0.05); 
}
.btn-ghost::before {
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
}

.btn-clear { background: transparent; color: #52525b; border: 1px solid var(--border); display: none; }
.btn-clear:hover { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); transform: translateY(-2px); }
.btn-clear::before { display: none; }

.btn-danger { background: transparent; color: var(--muted); border: 1px solid var(--border); display: none; }
.btn-danger:hover { color: #ffffff; border-color: #ffffff; transform: translateY(-2px); }
.btn-danger::before { display: none; }

.btn svg { width:14px; height:14px; flex-shrink:0; stroke-width: 2.5; }

/* ── REGION LOADSTRING POOL ── */
.ls-section {
  margin-top: 24px;
  display: none;
}

.ls-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.ls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.ls-label { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
.ls-ready { font-family: 'Geist Mono', monospace; font-size: 10px; color: #ffffff; display: flex; align-items: center; gap: 6px; }
.ls-ready::before { content:''; display:inline-block; width:5px; height:5px; background:#ffffff; border-radius:50%; box-shadow: 0 0 6px #ffffff; }

.ls-code { font-family: 'Geist Mono', monospace; font-size: 12px; color: #888891; padding: 18px 20px; word-break: break-all; line-height: 1.7; user-select: all; background: #020202; }

.ls-copy-btn {
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--muted);
  padding: 14px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.3s, color 0.3s;
}
.ls-copy-btn:hover { background: var(--surface2) ; color: var(--text); }
.ls-copy-btn svg { width: 14px; height: 14px; }

/* ── TOAST BLACK NOTE ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #ffffff;
  color: #000000;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.4s var(--ease-premium);
  z-index: 100;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

footer {
  margin-top: 60px;
  text-align: center;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #27272a;
}
</style>
</head>
<body>

<div class="container">

  <a class="back-link" href="dashboard.html">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    back to dashboard
  </a>

  <header>
    <div class="logo-static">
      <div class="logo-icon">⬡</div>
      <div class="logo">Code<span>Vault</span></div>
    </div>
    
    <div class="header-actions">
      <button id="btnEdit" class="btn btn-ghost" onclick="enableEdit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit Script
      </button>
      <button id="btnSave" class="btn btn-silver" onclick="saveChanges()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20,6 9,17 4,12"/></svg>
        Save Changes
      </button>
      <button id="btnCancel" class="btn btn-danger" onclick="cancelEdit()">
        Cancel
      </button>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-pill loading" id="statusPill">
      <div class="dot"></div>
      <span id="statusText">Synchronizing pipeline...</span>
    </div>
    <span class="script-id" id="scriptIdLabel"></span>
  </div>

  <div class="editor-card" id="editorCard">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dot-d"></div>
        <div class="dot-d"></div>
        <div class="dot-d"></div>
        <span class="lang-badge">LUA</span>
        <span class="mode-badge readonly" id="modeBadge">READ-ONLY</span>
      </div>
      <span class="line-count" id="lineCount">— lines</span>
    </div>

    <div class="editor-workspace">
      <div class="line-numbers" id="lineNumbers">1</div>
      <div class="textarea-container">
        <textarea id="code" placeholder="Awaiting handshake with remote cluster..." readonly spellcheck="false"></textarea>
      </div>
    </div>

    <div class="bottombar">
      <button class="btn btn-ghost" onclick="copyScript()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Code
      </button>
      <button id="btnClear" class="btn btn-clear" onclick="clearCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        Clear Code
      </button>
    </div>
  </div>

  <div class="ls-section" id="lsSection">
    <div class="ls-card">
      <div class="ls-header">
        <span class="ls-label">loadstring · executor deployment</span>
        <span class="ls-ready">live execution buffer</span>
      </div>
      <div class="ls-code" id="lsCode"></div>
      <button class="ls-copy-btn" id="lsCopyBtn" onclick="copyLoadstringFromPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Loadstring Payload
      </button>
    </div>
  </div>

  <footer>© 2026 CodeVault — all scripts encrypted at rest</footer>
</div>

<div class="toast" id="toast"></div>

<script>
let scriptId = '';
let originalCode = '';

const codeEl = document.getElementById('code');
const lineNumbersEl = document.getElementById('lineNumbers');

/* ── GENERADOR EXACTO DE LÍNEAS ESTILO GITHUB ── */
function updateGitHubLines() {
  const text = codeEl.value;
  const lines = text.split('\n');
  const count = lines.length;
  
  let numberHtml = '';
  for (let i = 1; i <= count; i++) {
    numberHtml += i + '<br>';
  }
  lineNumbersEl.innerHTML = numberHtml;
  document.getElementById('lineCount').textContent = `${count} line${count === 1 ? '' : 's'}`;
}

// Escuchar cambios de texto en vivo
codeEl.addEventListener('input', updateGitHubLines);
// Sincronizar scroll vertical entre el textarea y la barra de números
codeEl.addEventListener('scroll', () => {
  lineNumbersEl.scrollTop = codeEl.scrollTop;
});

function getId() {
  let id = new URLSearchParams(window.location.search).get('id');
  if (!id) { id = localStorage.getItem('idUsuario'); }
  return id;
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const span = document.getElementById('statusText');
  pill.className = 'status-pill ' + type;
  span.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── DATA FETCH PIPELINE ── */
async function loadScript() {
  scriptId = getId();
  
  if (!scriptId) { 
    setStatus('error', 'Handshake aborted: Void Target ID'); 
    codeEl.value = "-- [System Error]: No linked execution identifier found.";
    updateGitHubLines();
    showToast('⚠ Script identifier missing');
    return; 
  }

  document.getElementById('scriptIdLabel').textContent = `#${scriptId.toUpperCase()}`;

  const rawUrlForExecutor = 'https://codevault-vlv1.onrender.com/raw/' + scriptId;
  const ls = 'loadstring(game:HttpGet("' + rawUrlForExecutor + '"))()';

  document.getElementById('lsCode').textContent = ls;
  document.getElementById('lsSection').style.display = 'block';

  let intentos = 0;
  const maxIntentos = 3;

  async function intentarFetch() {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 40000);

      setStatus('loading', intentos > 0 ? `Waking up server (Attempt ${intentos + 1})...` : 'Synchronizing remote clusters...');

      const res = await fetch('https://codevault-vlv1.onrender.com/web/raw/' + scriptId, { signal: controller.signal });
      clearTimeout(timeoutId);

      if (!res.ok) throw new Error();
      const code = await res.text();
      
      if (code.trim().startsWith('<!DOCTYPE html>')) {
        setStatus('error', 'Safe Scope Blocked');
        codeEl.value = "-- [Server Restriction]: Web access disabled or record empty for this ID.";
        updateGitHubLines();
        showToast('⚠ Error: Wrapper detected');
        return;
      }

      codeEl.value = code;
      originalCode = code;
      updateGitHubLines();
      setStatus('ready', 'Synchronized — Safe Scope');
      showToast('✓ Pipeline sync successful');
    } catch (err) {
      intentos++;
      if (intentos < maxIntentos) {
        setStatus('loading', `Server cold boot. Retrying...`);
        setTimeout(intentarFetch, 3000);
      } else {
        setStatus('error', 'Handshake timeout');
        showToast('⚠ Fetch aborted');
      }
    }
  }

  intentarFetch();
}

/* ── CONTROLES DE INTERFAZ ELÉCTRICA ── */
function enableEdit() {
  codeEl.readOnly = false;
  codeEl.focus();
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = 'inline-flex';
  document.getElementById('btnCancel').style.display = 'inline-flex';
  document.getElementById('btnClear').style.display = 'inline-flex';
  document.getElementById('editorCard').classList.add('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge editing';
  document.getElementById('modeBadge').textContent = 'EDITING';
  setStatus('editing', 'Staging code modifications');
}

function cancelEdit() {
  codeEl.value = originalCode;
  codeEl.readOnly = true;
  updateGitHubLines();
  document.getElementById('btnEdit').style.display = 'inline-flex';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('btnClear').style.display = 'none';
  document.getElementById('editorCard').classList.remove('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge readonly';
  document.getElementById('modeBadge').textContent = 'READ-ONLY';
  setStatus('ready', 'Synchronized — Safe Scope');
  showToast('Modifications discarded');
}

function clearCode() {
  if (codeEl.readOnly) return; 
  codeEl.value = '';
  codeEl.focus();
  updateGitHubLines();
  showToast('✓ Workspace buffer cleared');
}

async function saveChanges() {
  const updated = codeEl.value;
  if (!updated.trim()) { showToast('⚠ Layout layout cannot be empty'); return; }

  setStatus('loading', 'Pushing runtime patch...');

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 40000);

    const res = await fetch('https://codevault-vlv1.onrender.com/update/' + scriptId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: updated }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) throw new Error();

    originalCode = updated;
    codeEl.readOnly = true;
    document.getElementById('btnEdit').style.display = 'inline-flex';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('btnClear').style.display = 'none';
    document.getElementById('editorCard').classList.remove('edit-mode');
    document.getElementById('modeBadge').className = 'mode-badge readonly';
    document.getElementById('modeBadge').textContent = 'READ-ONLY';
    setStatus('ready', 'Synchronized — Safe Scope');
    showToast('✓ Pipeline cloud updated');
  } catch {
    setStatus('error', 'Patch execution failed');
    showToast('⚠ Error committing changes');
  }
}

/* ── PORTAPAPELES CORES ── */
function copyScript() {
  const code = codeEl.value;
  if (!code.trim()) { showToast('⚠ Editor buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✓ Script copied'));
}

function copyLoadstringFromPanel() {
  const ls = document.getElementById('lsCode').textContent;
  const btn = document.getElementById('lsCopyBtn');
  navigator.clipboard.writeText(ls).then(() => {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20,6 9,17 4,12"/></svg> Payload Transferred!`;
    showToast('✓ Loadstring copied');
    setTimeout(() => {
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring Payload`;
    }, 2000);
  });
}

loadScript();
</script>
</body>
</html>
