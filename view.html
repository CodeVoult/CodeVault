<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CodeVault — View Script</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
  // ── INTERCEPTOR AUTOMÁTICO PARA EJECUTORES DE ROBLOX (MODO RAW DETECT) ──
  const urlParams = new URLSearchParams(window.location.search);
  const idScript = urlParams.get('id') || localStorage.getItem('idUsuario');
  const esRawMode = urlParams.get('raw') === 'true';

  if (esRawMode && idScript) {
    fetch('https://codevault-vlv1.onrender.com/web/raw/' + idScript)
      .then(res => res.text())
      .then(luaCode => {
        document.open("text/plain");
        document.write(luaCode);
        document.close();
      })
      .catch(() => {
        document.open("text/plain");
        document.write('-- Error: No se pudo conectar con el servidor CodeVault.');
        document.close();
      });
  }
</script>

<style>
:root {
  --bg: #000000;
  --surface: #040405;
  --surface2: #08080a;
  --border: #121215;
  --border2: #1e1e22;
  --text: #ffffff;
  --muted: #4e4e56;
  
  /* Gradientes Cromados Premium */
  --silver-light: linear-gradient(135deg, #ffffff 0%, #e2e8f0 40%, #94a3b8 70%, #cbd5e1 100%);
  --silver-dark: linear-gradient(135deg, #2e3035 0%, #0f1012 50%, #1e2024 100%);
  --silver-glow: rgba(255, 255, 255, 0.08);
  --silver-border: rgba(255, 255, 255, 0.25);
  --danger-glow: rgba(239, 68, 68, 0.08);
  --ease-premium: cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.22;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.4s var(--ease-premium);
  margin-bottom: 32px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  animation: fadeUpPremium 0.7s var(--ease-premium) both;
}
.back-link:hover { color: var(--text); transform: translateX(-4px); }
.back-link svg { width: 12px; height: 12px; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
  animation: fadeUpPremium 0.9s 0.05s var(--ease-premium) both;
}

/* ── LOGO REDISEÑADO PREMIUM (NO LLEVA A DASHBOARD) ── */
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  user-select: none;
  cursor: default;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: var(--bg);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  position: relative;
  transition: all 0.5s var(--ease-premium);
}

/* Efecto Bisel de Cromo Puro en Icono */
.logo-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  padding: 1px;
  background: linear-gradient(135deg, #ffffff 0%, #3a3b40 45%, #ffffff 55%, #111215 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

.logo-icon-inner {
  background: var(--silver-light);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 800;
  filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
}

.logo {
  font-family: 'Geist Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.04em;
  background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  position: relative;
}
.logo span { 
  font-weight: 300; 
  background: linear-gradient(180deg, #8a8a93 0%, #3f3f46 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  animation: fadeUpPremium 0.9s 0.1s var(--ease-premium) both;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 20px;
  transition: all 0.4s var(--ease-premium);
}

.status-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #222;
  transition: background 0.4s var(--ease-premium);
}

.status-pill.loading .dot { background: #a1a1aa; animation: blink 1s infinite; }
.status-pill.ready .dot   { background: #ffffff; box-shadow: 0 0 12px rgba(255,255,255,0.9); animation: pulse-dot 2s infinite; }
.status-pill.editing .dot { background: #f5a623; box-shadow: 0 0 10px rgba(245,166,35,0.5); }
.status-pill.error .dot   { background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.3)} 50%{box-shadow:0 0 14px rgba(255,255,255,0.7)} }

  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.05em;
}

  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;

  transition: border-color 0.5s var(--ease-premium), box-shadow 0.5s var(--ease-premium);
}

.editor-card:hover, .editor-card.edit-mode {
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 40px 90px rgba(0,0,0,0.95), 0 0 50px rgba(255,255,255,0.02);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot-d { width: 7px; height: 7px; border-radius: 50%; background: #1c1c21; }

.lang-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #a1a1aa;
  background: #121215;
  padding: 4px 12px;

  border: 1px solid var(--border);

}

.mode-badge {

  font-size: 10px;

  font-weight: 600;

}

.mode-badge.editing  { color: #f5a623; background: rgba(245,166,35,0.03); border: 1px solid rgba(245,166,35,0.25); }

.line-count {

textarea {

textarea[readonly] { color: #71717a; cursor: default; }

.bottombar {
  display: flex;

  gap: 12px;
  padding: 18px 24px;
  border-top: 1px solid var(--border);

/* ── BOTONES CON EFECTO DE CROMO/PLATEADO LÍQUIDO PREMIUM ── */

  align-items: center;

  border-radius: 8px;

  cursor: pointer;
  transition: all 0.4s var(--ease-premium);

/* Estilo Cromo Líquido de la Acción Principal (Edit / Save) */
.btn-silver-action {
  background: var(--silver-light);
  color: #000000;
  box-shadow: 0 4px 15px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.4);
}

  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(255,255,255,0.18), inset 0 1px 0 rgba(255,255,255,0.5);
  filter: brightness(1.05);
}
.btn-silver-action:active { transform: translateY(0); }

/* Estilo Dark Chrome / Metal Pulido Oscuro (Ghost) */
.btn-ghost { 
  background: var(--silver-dark); 
  color: #e4e4e7; 
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

.btn-save { display: none; }

.btn-danger { background: transparent; color: var(--muted); border: 1px solid var(--border); display: none; }

.btn svg { width:14px; height:14px; flex-shrink:0; }

.ls-section {
  margin-top: 24px;
  animation: fadeUpPremium 0.6s var(--ease-premium) both;
  display: none;
}

.ls-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.ls-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}

.ls-label { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }
.ls-ready { font-family: 'Geist Mono', monospace; font-size: 10px; color: #ffffff; display: flex; align-items: center; gap: 6px; font-weight: 500; }
.ls-ready::before { content:''; display:inline-block; width:5px; height:5px; background:#ffffff; border-radius:50%; box-shadow: 0 0 8px #ffffff; }

.ls-code { font-family: 'Geist Mono', monospace; font-size: 12px; color: #a1a1aa; padding: 22px 24px; word-break: break-all; line-height: 1.75; user-select: all; background: #020203; }

.ls-copy-btn {
  width: 100%;
  background: var(--silver-dark);
  border: none;
  border-top: 1px solid var(--border);
  color: #a1a1aa;
  padding: 16px;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.4s var(--ease-premium);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.ls-copy-btn:hover { color: var(--text); background: #131418; border-top-color: rgba(255,255,255,0.15); }
.ls-copy-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── TOAST CON ESTILO MEJORADO ── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: #000000;
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 24px;
  border-radius: 8px;
  pointer-events: none;
  opacity: 0;
  transition: all 0.5s var(--ease-premium);
  z-index: 100;
  white-space: nowrap;
  box-shadow: 0 25px 50px rgba(0,0,0,0.85), 0 0 30px rgba(255,255,255,0.05);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes fadeUpPremium {
  from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
  to   { opacity: 1; transform: translateY(0); filter: blur(0); }
}

footer {
  margin-top: 60px;
  text-align: center;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: #1c1c21;
  animation: fadeUpPremium 1s 0.3s var(--ease-premium) both;
  letter-spacing: 0.02em;
}
</style>

<div class="toast" id="toast"></div>

<script>
/* ── BACKGROUND PARTICLES ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.12;
    this.vy = -(Math.random() * 0.18 + 0.04);
    this.r = Math.random() * 0.8 + 0.3;
    this.alpha = Math.random() * 0.2 + 0.05;
    this.life = 0;
    this.maxLife = Math.random() * 600 + 300;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life++;
    if (this.life > this.maxLife || this.y < -10) this.reset(false);
  }
  draw() {
    const p = this.life / this.maxLife;
    const fade = p < 0.1 ? p / 0.1 : p > 0.8 ? 1 - (p - 0.8) / 0.2 : 1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${this.alpha * fade})`;
    ctx.fill();
  }
}
for (let i = 0; i < 35; i++) particles.push(new Particle());

(function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
})();

/* ── UI CORE STATE & LOGIC ── */
let scriptId = '';
let originalCode = '';

function getId() {
  let id = new URLSearchParams(window.location.search).get('id');
  if (!id) { id = localStorage.getItem('idUsuario'); }
  return id;
}

function setStatus(type, text) {
  const pill = document.getElementById('statusPill');
  const span = document.getElementById('statusText');
  pill.className = 'status-pill ' + type;
  span.textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function updateLineCount(val) {
  const lines = val ? val.split('\n').length : 0;
  document.getElementById('lineCount').textContent = `${lines} line${lines === 1 ? '' : 's'}`;
}

/* ── DATA FETCH EN RUTAS WEB PLANAS EXCLUSIVAS ── */
async function loadScript() {
  scriptId = getId();
  
  if (!scriptId) { 
    setStatus('error', 'Handshake aborted: Void Target ID'); 
    document.getElementById('code').value = "-- [System Error]: No linked execution identifier found in session scope.";
    showToast('⚠ Script identifier missing');
    return; 
  }

  document.getElementById('scriptIdLabel').textContent = `#${scriptId.toUpperCase()}`;

  const rawUrlForExecutor = 'https://codevault-vlv1.onrender.com/raw/' + scriptId;
  const ls = 'loadstring(game:HttpGet("' + rawUrlForExecutor + '"))()';

  document.getElementById('lsCode').textContent = ls;
  document.getElementById('lsSection').style.display = 'block';

  let intentos = 0;
  const maxIntentos = 3;

  async function intentarFetch() {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 40000);

      setStatus('loading', intentos > 0 ? `Waking up server (Attempt ${intentos + 1})...` : 'Synchronizing remote clusters...');

      const res = await fetch('https://codevault-vlv1.onrender.com/web/raw/' + scriptId, { signal: controller.signal });
      clearTimeout(timeoutId);

      if (!res.ok) throw new Error();
      const code = await res.text();
      
      if (code.trim().startsWith('<!DOCTYPE html>')) {
        setStatus('error', 'Safe Scope Blocked');
        document.getElementById('code').value = "-- [Server Restriction]: Web access disabled or record empty for this ID.";
        showToast('⚠ Received secure wrapper instead of Lua raw string');
        return;
      }

      document.getElementById('code').value = code;
      originalCode = code;
      updateLineCount(code);
      setStatus('ready', 'Synchronized — Safe Scope');
      showToast('✓ Pipeline sync successful');
    } catch (err) {
      intentos++;
      if (intentos < maxIntentos) {
        setStatus('loading', `Server cold boot detected. Retrying in 3s...`);
        setTimeout(intentarFetch, 3000);
      } else {
        setStatus('error', 'Handshake timeout');
        showToast('⚠ Fetch aborted: Remote cluster sleeping');
      }
    }
  }

  intentarFetch();
}

document.getElementById('code').addEventListener('input', function() {
  updateLineCount(this.value);
});

/* ── INTERFACES & CONTROLS INTERNOS ── */
function enableEdit() {
  const ta = document.getElementById('code');
  ta.readOnly = false;
  ta.focus();
  document.getElementById('btnEdit').style.display = 'none';
  document.getElementById('btnSave').style.display = 'inline-flex';
  document.getElementById('btnCancel').style.display = 'inline-flex';
  document.getElementById('btnClear').style.display = 'inline-flex';
  document.getElementById('editorCard').classList.add('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge editing';
  document.getElementById('modeBadge').textContent = 'EDITING';
  setStatus('editing', 'Staging code modifications');
}

function cancelEdit() {
  const ta = document.getElementById('code');
  ta.value = originalCode;
  ta.readOnly = true;
  updateLineCount(originalCode);
  document.getElementById('btnEdit').style.display = 'inline-flex';
  document.getElementById('btnSave').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('btnClear').style.display = 'none';
  document.getElementById('editorCard').classList.remove('edit-mode');
  document.getElementById('modeBadge').className = 'mode-badge readonly';
  document.getElementById('modeBadge').textContent = 'READ-ONLY';
  setStatus('ready', 'Synchronized — Safe Scope');
  showToast('Modifications discarded');
}

function clearCode() {
  const ta = document.getElementById('code');
  if (ta.readOnly) return; 
  ta.value = '';
  ta.focus();
  updateLineCount('');
  showToast('✓ Workspace buffer cleared');
}

async function saveChanges() {
  const ta = document.getElementById('code');
  const updated = ta.value;
  if (!updated.trim()) { showToast('⚠ Cluster allocation layout cannot be empty'); return; }

  setStatus('loading', 'Pushing runtime patch...');

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 40000);

    const res = await fetch('https://codevault-vlv1.onrender.com/update/' + scriptId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: updated }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) throw new Error();

    originalCode = updated;
    ta.readOnly = true;
    document.getElementById('btnEdit').style.display = 'inline-flex';
    document.getElementById('btnSave').style.display = 'none';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('btnClear').style.display = 'none';
    document.getElementById('editorCard').classList.remove('edit-mode');
    document.getElementById('modeBadge').className = 'mode-badge readonly';
    document.getElementById('modeBadge').textContent = 'READ-ONLY';
    setStatus('ready', 'Synchronized — Safe Scope');
    showToast('✓ Pipeline cloud updated');
  } catch {
    setStatus('error', 'Patch execution failed');
    showToast('⚠ Error committing changes to server');
  }
}

/* ── CLIPBOARD ENGINE ── */
function copyScript() {
  const code = document.getElementById('code').value;
  if (!code.trim()) { showToast('⚠ Editor buffer empty'); return; }
  navigator.clipboard.writeText(code).then(() => showToast('✓ Script text mapped to clipboard'));
}

function copyLoadstringFromPanel() {
  const ls = document.getElementById('lsCode').textContent;
  const btn = document.getElementById('lsCopyBtn');
  navigator.clipboard.writeText(ls).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg> Payload Transferred!`;
    showToast('✓ Loadstring copied');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Loadstring Payload`;
    }, 2000);
  });
}
